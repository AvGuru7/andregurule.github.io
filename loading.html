<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Andre Gurule — Portfolio World</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#f0c040;
  --ui-bg:#0d0a18;
}
body{
  background:#000;
  font-family:'Press Start 2P',monospace;
  overflow:hidden;width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:20px;
  -webkit-tap-highlight-color:transparent;
}
#loading-title{
  font-size:clamp(10px,3vw,22px);color:var(--gold);
  text-align:center;line-height:2;
  animation:blink 1s step-end infinite;
}
#loading-sub{
  font-family:'VT323',monospace;
  font-size:clamp(16px,3.5vw,22px);
  color:#a0d8ff;text-align:center;
}
#press-start{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,1.8vw,12px);color:var(--gold);
  border:3px solid var(--gold);
  padding:clamp(10px,2vh,14px) clamp(16px,3vw,24px);
  background:none;cursor:pointer;margin-top:10px;
  touch-action:manipulation;
  animation:blink 1s step-end infinite;
}
#press-start:hover,#press-start:active{
  background:rgba(240,192,64,0.12);
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div id="loading-title">ANDRE GURULE<br>PORTFOLIO WORLD</div>
<div id="loading-sub">© 2025 — All rights reserved<br>A professional adventure awaits</div>
<button id="press-start" onclick="startGame()">▶ PRESS START</button>

<script>
// Initialize fresh game state here — this is the only place state is born.
// Values are passed to index.html (and all other pages) via URL query params.
function startGame(){
  const state = {
    points: 0,
    visited: '',   // comma-separated zone ids visited
    unlocked: ''   // comma-separated unlocked secrets (e.g. 'g14')
  };
  const params = new URLSearchParams(state).toString();
  window.location.href = 'index.html?' + params;
}

// Also allow keyboard ENTER / Space to start
document.addEventListener('keydown', e => {
  if(e.key === 'Enter' || e.key === ' ') startGame();
});
</script>
</body>
</html>
