<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Tahoe — Andre Gurule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0c040;
    --ui-bg: #0d0a18;
    --ui-text: #f0e8c0;
    --lake-dark: #0a2a5a;
    --lake-mid: #1040a0;
    --lake-light: #2060d0;
    --controller-h: 160px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0d1a10;
    font-family: 'Press Start 2P', monospace;
    color: var(--ui-text);
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: calc(100vh - var(--controller-h));
    image-rendering: pixelated;
    cursor: crosshair;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 10px; left: 10px;
    display: flex; gap: 8px; align-items: center;
    z-index: 100;
    pointer-events: none;
  }
  #pointsBadge {
    background: rgba(13,10,24,0.85);
    border: 2px solid var(--gold);
    padding: 4px 10px;
    font-size: clamp(7px, 1.5vw, 10px);
    color: var(--gold);
    border-radius: 4px;
  }

  /* ── DIALOG BOX ── */
  #dialogBox {
    display: none;
    position: fixed;
    bottom: calc(var(--controller-h) + 12px);
    left: 50%; transform: translateX(-50%);
    width: min(640px, 94vw);
    background: var(--ui-bg);
    border: 3px solid var(--gold);
    border-radius: 6px;
    padding: 14px 18px 12px;
    z-index: 200;
    font-family: 'VT323', monospace;
    font-size: clamp(16px, 3.5vw, 22px);
    color: var(--ui-text);
    line-height: 1.5;
  }
  #dialogBox .speaker {
    color: var(--gold);
    font-size: clamp(13px, 2.5vw, 17px);
    margin-bottom: 6px;
    font-family: 'Press Start 2P', monospace;
  }
  #dialogBox .prompt {
    color: #a0c0ff;
    font-size: clamp(12px, 2vw, 14px);
    margin-top: 8px;
    font-family: 'Press Start 2P', monospace;
  }

  /* ── MENU OVERLAY ── */
  #menuOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,10,24,0.92);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  #menuOverlay.open { display: flex; }
  #menuOverlay h2 {
    font-size: clamp(12px, 2.5vw, 18px);
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .menu-btn {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--ui-text);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 1.8vw, 12px);
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 4px;
    text-decoration: none;
    display: block;
    text-align: center;
    min-width: 220px;
  }
  .menu-btn:hover { background: var(--gold); color: var(--ui-bg); }

  /* ── NES CONTROLLER ── */
  /* ── NES CONTROLLER ── */
  #nes-controller{position:fixed;bottom:0;left:0;right:0;z-index:600;display:flex;flex-direction:column;align-items:center;gap:8px;background:#0d0a18;padding:clamp(8px,1.5vh,16px) 0 clamp(8px,1.5vh,14px);border-top:2px solid #2a2040;}
  #controller-body{position:relative;width:clamp(388.8px,60.75vw,518.4px);height:clamp(90px,14vw,120px);background:linear-gradient(180deg,#3a3a40 0%,#2e2e34 60%,#252528 100%);border-radius:6px 6px 10px 10px;border:2px solid #555;box-shadow:0 4px 18px rgba(0,0,0,0.7),0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08),inset 0 -2px 0 rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,28px);}
  #controller-body::before{content:'';position:absolute;top:10px;left:12px;right:12px;height:2px;background:rgba(255,255,255,0.05);border-radius:1px;}
  #controller-body::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:clamp(60px,12vw,90px);height:6px;background:rgba(255,255,255,0.04);border-radius:3px;}
  #dpad{position:relative;width:clamp(70px,13vw,96px);height:clamp(70px,13vw,96px);flex-shrink:0;}
  .dpad-h,.dpad-v{position:absolute;background:linear-gradient(180deg,#4c4c56,#38383f);border:2.5px solid #1a1a20;border-radius:3px;}
  .dpad-h{left:0;right:0;top:33.3%;bottom:33.3%;box-shadow:inset 0 2px 0 rgba(255,255,255,0.09),inset 0 -2px 0 rgba(0,0,0,0.4);}
  .dpad-v{top:0;bottom:0;left:33.3%;right:33.3%;box-shadow:inset 2px 0 0 rgba(255,255,255,0.09),inset -2px 0 0 rgba(0,0,0,0.4);}
  .dpad-center{position:absolute;left:33.3%;right:33.3%;top:33.3%;bottom:33.3%;background:#3c3c44;border-radius:2px;z-index:2;}
  .dpad-btn{position:absolute;z-index:3;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;}
  #btn-up{top:0;left:33.3%;right:33.3%;height:33.3%;}
  #btn-down{bottom:0;left:33.3%;right:33.3%;height:33.3%;}
  #btn-left{left:0;top:33.3%;bottom:33.3%;width:33.3%;}
  #btn-right{right:0;top:33.3%;bottom:33.3%;width:33.3%;}
  #btn-up::after{content:'▲';}#btn-down::after{content:'▼';}
  #btn-left::after{content:'◀';}#btn-right::after{content:'▶';}
  .dpad-btn::after{font-size:clamp(8px,1.6vw,12px);color:rgba(255,255,255,0.3);}
  .dpad-btn.pressing::after{color:var(--gold);text-shadow:0 0 7px var(--gold);}
  #center-section{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vw,10px);flex-shrink:0;margin-left:clamp(8px,2vw,16px);margin-right:clamp(0px,1vw,8px);}
  #select-start-row{display:flex;gap:clamp(8px,1.8vw,14px);align-items:center;}
  .ss-btn{width:clamp(32px,6vw,46px);height:clamp(10px,2vw,14px);background:linear-gradient(180deg,#3a3a42,#28282e);border:1.5px solid #1a1a20;border-radius:clamp(5px,1vw,7px);box-shadow:0 2px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.07);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,box-shadow 0.06s;}
  .ss-btn:active,.ss-btn.pressed{transform:translateY(1px);box-shadow:none;}
  .ss-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.8vw,6px);color:#666;letter-spacing:0.5px;margin-top:clamp(2px,0.5vh,4px);text-align:center;}
  #menu-btn-wrap{display:flex;flex-direction:column;align-items:center;}
  #btnMenu{width:clamp(36px,6.5vw,50px);height:clamp(36px,6.5vw,50px);border-radius:50%;background:radial-gradient(circle at 42% 38%,#4a4a54,#26262e);border:2.5px solid #1a1a20;box-shadow:0 3px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1),0 0 0 3px rgba(240,192,64,0.15);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,box-shadow 0.06s;}
  #btnMenu:hover{box-shadow:0 3px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1),0 0 0 4px rgba(240,192,64,0.35);}
  #btnMenu:active,#btnMenu.pressed{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.55);}
  #menu-btn-icon{font-family:'Press Start 2P',monospace;font-size:clamp(5px,0.9vw,7px);color:rgba(240,192,64,0.85);letter-spacing:0.5px;line-height:1.3;text-align:center;}
  #menu-btn-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.7vw,5px);color:#c8982a;margin-top:4px;letter-spacing:0.5px;}
  #ab-buttons{display:flex;gap:clamp(8px,1.8vw,14px);align-items:center;flex-shrink:0;transform:rotate(-18deg);}
  .ab-btn{width:clamp(36px,6.5vw,50px);height:clamp(36px,6.5vw,50px);border-radius:50%;border:2.5px solid #1a1a20;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:clamp(9px,1.6vw,12px);cursor:pointer;touch-action:manipulation;user-select:none;box-shadow:0 4px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.15);transition:transform 0.06s,box-shadow 0.06s;-webkit-tap-highlight-color:transparent;}
  .ab-btn:active,.ab-btn.pressed{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,0.55);}
  #btnB{background:radial-gradient(circle at 40% 35%,#cc4466,#aa2244);color:rgba(255,255,255,0.85);}
  #btnA{background:radial-gradient(circle at 40% 35%,#cc4466,#aa2244);color:rgba(255,255,255,0.85);}
  .ab-label-row{display:flex;gap:clamp(8px,1.8vw,14px);transform:rotate(-18deg);margin-top:clamp(2px,0.5vh,4px);}
  .ab-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.7vw,5px);color:#555;width:clamp(36px,6.5vw,50px);text-align:center;}
  #ab-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  #ctrl-hint{font-family:'VT323',monospace;font-size:clamp(10px,1.8vw,13px);color:var(--gold);text-align:center;opacity:0.75;}
/* ── Larger touch targets on touch devices ── */
@media (pointer:coarse){
  #dpad{
    width:clamp(96px,22vw,120px);
    height:clamp(96px,22vw,120px);
  }
  .dpad-btn::after{ font-size:clamp(12px,3vw,16px); }
  .ss-btn{
    width:clamp(46px,11vw,60px);
    height:clamp(16px,3.6vw,22px);
  }
  .ss-label{ font-size:clamp(6px,1.4vw,8px); }
  #controller-body{
    height:clamp(120px,30vw,150px);
    width:min(560px, calc(100vw - 16px));
    padding:0 clamp(6px,2vw,16px);
  }
}

  /* ── INVENTORY OVERLAY ── */
  /* ── Inventory overlay — two-column sidebar design ── */
  #inventory-overlay{position:fixed;top:0;left:0;right:0;background:rgba(10,8,24,0.97);backdrop-filter:blur(4px);z-index:400;display:none;flex-direction:column;}
  #inventory-overlay.open{display:flex;}
  /* Header */
  #inv-header{display:flex;align-items:center;justify-content:space-between;padding:clamp(8px,1.5vh,14px) clamp(12px,2vw,20px);border-bottom:2px solid rgba(240,192,64,0.35);flex-shrink:0;}
  #inv-header-title{font-size:clamp(8px,1.4vw,12px);color:var(--gold);letter-spacing:2px;}
  #inv-header-pts{font-family:'VT323',monospace;font-size:clamp(16px,2.8vw,22px);color:var(--gold);}
  #inv-header-hint{font-size:clamp(5px,0.8vw,7px);color:#a09070;}
  /* Body — two columns */
  #inv-body{display:flex;flex:1;overflow:hidden;min-height:0;}
  /* Left: item list */
  #inv-items-list{width:clamp(180px,30vw,260px);flex-shrink:0;overflow-y:auto;border-right:2px solid rgba(240,192,64,0.2);padding:clamp(8px,1.2vh,14px) 0;}
  .inv-category{font-size:clamp(6px,0.9vw,8px);color:#a09070;letter-spacing:2px;padding:clamp(8px,1.2vh,12px) clamp(10px,1.5vw,16px) 4px;border-bottom:1px solid rgba(240,192,64,0.12);}
  .inv-row{display:flex;align-items:center;gap:8px;padding:clamp(6px,1vh,10px) clamp(10px,1.5vw,16px);cursor:default;border-left:3px solid transparent;transition:background 0.1s;}
  .inv-row.has-content{cursor:pointer;}
  .inv-row.has-content:hover{background:rgba(240,192,64,0.08);}
  .inv-row.selected{background:rgba(240,192,64,0.13);border-left-color:var(--gold);}
  .inv-row.locked{opacity:0.4;}
  .inv-row-icon{font-size:clamp(14px,2.2vw,20px);line-height:1;flex-shrink:0;}
  .inv-row-info{flex:1;min-width:0;}
  .inv-row-name{font-size:clamp(5px,0.82vw,7px);color:var(--ui-text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .inv-row-name.locked-name{color:#a09070;}
  .inv-row-pts{font-family:'VT323',monospace;font-size:clamp(11px,1.8vw,14px);color:var(--gold);}
  .inv-row-badge{font-size:clamp(9px,1.4vw,12px);flex-shrink:0;}
  .inv-row-badge.obtained{color:#40c060;}
  .inv-row-badge.locked-badge{color:#554433;}
  /* Right: detail panel */
  #inv-detail{flex:1;overflow-y:auto;padding:clamp(12px,2vh,20px) clamp(14px,2.5vw,24px);}
  #inv-detail-empty{height:100%;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:clamp(14px,2.2vw,18px);color:#554433;text-align:center;}
  #inv-detail-content{display:none;}
  #inv-detail-content.visible{display:block;}
  #inv-detail-icon{font-size:clamp(28px,5vw,44px);margin-bottom:8px;}
  #inv-detail-name{font-size:clamp(8px,1.4vw,12px);color:var(--gold);margin-bottom:clamp(6px,1vh,10px);letter-spacing:1px;}
  #inv-detail-category{font-family:'VT323',monospace;font-size:clamp(12px,2vw,16px);color:#a09070;margin-bottom:clamp(8px,1.4vh,14px);letter-spacing:2px;}
  #inv-detail-pts{font-family:'VT323',monospace;font-size:clamp(14px,2.4vw,20px);color:var(--gold);margin-bottom:clamp(10px,1.8vh,18px);border-bottom:1px solid rgba(240,192,64,0.18);padding-bottom:clamp(8px,1.2vh,12px);}
  .inv-detail-page{margin-bottom:clamp(10px,1.8vh,16px);}
  .inv-detail-page-heading{font-size:clamp(6px,0.9vw,8px);color:#a09070;letter-spacing:2px;margin-bottom:6px;}
  .inv-detail-page-body{font-family:'VT323',monospace;font-size:clamp(14px,2.2vw,18px);color:var(--ui-text);line-height:1.5;}

  /* ── Photo Spot overlay — Andre's real lake photos ── */
  #photo-overlay{position:fixed;top:0;left:0;right:0;background:rgba(10,8,24,0.97);backdrop-filter:blur(4px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;}
  #photo-overlay.open{display:flex;}
  #photo-frame{width:min(92vw,820px);max-height:78vh;display:flex;flex-direction:column;align-items:center;}
  #photo-title{font-size:clamp(8px,1.5vw,12px);color:var(--gold);letter-spacing:2px;margin-bottom:clamp(8px,1.4vh,14px);text-align:center;}
  #photo-stage{position:relative;width:100%;display:flex;align-items:center;justify-content:center;}
  #photo-img{max-width:100%;max-height:56vh;border:3px solid var(--gold);border-radius:4px;box-shadow:0 0 24px rgba(240,192,64,0.25);image-rendering:auto;background:#0d0a18;}
  .photo-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(13,10,24,0.85);border:2px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:clamp(10px,1.8vw,16px);width:clamp(34px,5vw,44px);height:clamp(34px,5vw,44px);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;}
  .photo-arrow:hover{background:rgba(240,192,64,0.18);}
  .photo-arrow.hidden{visibility:hidden;}
  #photo-prev{left:clamp(-6px,-1vw,6px);}
  #photo-next{right:clamp(-6px,-1vw,6px);}
  #photo-caption{font-family:'VT323',monospace;font-size:clamp(15px,2.4vw,20px);color:var(--ui-text);line-height:1.4;margin-top:clamp(8px,1.4vh,14px);text-align:center;min-height:1.4em;max-width:90%;}
  #photo-count{font-family:'VT323',monospace;font-size:clamp(12px,1.8vw,15px);color:#a09070;letter-spacing:2px;margin-top:6px;}
  #photo-close{margin-top:clamp(12px,2vh,18px);background:var(--gold);color:#1a1208;border:none;font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.1vw,10px);letter-spacing:1px;padding:clamp(8px,1.4vh,12px) clamp(16px,2.5vw,26px);border-radius:3px;cursor:pointer;}
  #photo-close:hover{box-shadow:0 0 14px rgba(240,192,64,0.6);}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="pointsBadge">★ <span id="pointsDisplay">0</span></div>
</div>

<!-- Dialog -->
<div id="dialogBox">
  <div class="speaker" id="dialogSpeaker"></div>
  <div id="dialogText"></div>
  <div class="prompt" id="dialogPrompt"></div>
</div>

<!-- Menu Overlay -->
<div id="menuOverlay">
  <h2>⚓ LAKE TAHOE</h2>
  <a class="menu-btn" id="menuWorldLink" href="world.html#spawn=lake-tahoe">🗺 WORLD MAP</a>
  <a class="menu-btn" href="andregurule-library.html">📚 HALL OF RECORDS</a>
  <a class="menu-btn" href="castle-anthrax.html">🏰 CASTLE ANTHRAX</a>
  <button class="menu-btn" id="menuClose">✕ CLOSE</button>
</div>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- NES Controller -->
<div id="nes-controller">
  <div id="controller-body">
    <div id="dpad">
      <div class="dpad-h"></div><div class="dpad-v"></div><div class="dpad-center"></div>
      <div class="dpad-btn" id="btn-up"    data-dir="up"></div>
      <div class="dpad-btn" id="btn-down"  data-dir="down"></div>
      <div class="dpad-btn" id="btn-left"  data-dir="left"></div>
      <div class="dpad-btn" id="btn-right" data-dir="right"></div>
    </div>
    <div id="center-section">
      <div id="menu-btn-wrap">
        <div id="btnMenu" onclick="toggleMenu()"><div id="menu-btn-icon">MENU</div></div>
        <div id="menu-btn-label">MENU</div>
      </div>
      <div id="select-start-row">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="ss-btn" id="btnSelect"></div>
          <div class="ss-label">SELECT</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="ss-btn" id="btnStart"></div>
          <div class="ss-label">START</div>
        </div>
      </div>
    </div>
    <div id="ab-col">
      <div id="ab-buttons">
        <div class="ab-btn" id="btnB">B</div>
        <div class="ab-btn" id="btnA">A</div>
      </div>
      <div class="ab-label-row">
        <div class="ab-label">BACK</div>
        <div class="ab-label">INTERACT</div>
      </div>
    </div>
  </div>
  <div id="ctrl-hint">D-PAD · A=INTERACT · B=CLOSE · MENU=NAV · SELECT=INVENTORY</div>
</div>

<!-- Inventory Overlay -->
<div id="inventory-overlay">
  <div id="inv-header">
    <div id="inv-header-title">★ INVENTORY ★</div>
    <div id="inv-header-pts"></div>
    <div id="inv-header-hint">
      <span style="background:#222;border:1.5px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;">SELECT</span>
      or
      <span style="background:#222;border:1.5px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;">B</span>
      to close
    </div>
  </div>
  <div id="inv-body">
    <div id="inv-items-list"></div>
    <div id="inv-detail">
      <div id="inv-detail-empty">← Select an item<br>to view details</div>
      <div id="inv-detail-content">
        <div id="inv-detail-icon"></div>
        <div id="inv-detail-name"></div>
        <div id="inv-detail-category"></div>
        <div id="inv-detail-pts"></div>
        <div id="inv-detail-pages"></div>
      </div>
    </div>
  </div>
</div>

<!-- Photo Spot overlay -->
<div id="photo-overlay">
  <div id="photo-frame">
    <div id="photo-title"></div>
    <div id="photo-stage">
      <button id="photo-prev" class="photo-arrow" aria-label="Previous photo">◀</button>
      <img id="photo-img" alt="">
      <button id="photo-next" class="photo-arrow" aria-label="Next photo">▶</button>
    </div>
    <div id="photo-caption"></div>
    <div id="photo-count"></div>
    <button id="photo-close">CLOSE</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  GAME STATE (URL-param based)
// ─────────────────────────────────────────────
const GameState = (() => {
  const params = new URLSearchParams(location.search);
  let points   = parseInt(params.get('points') || '0', 10);
  let visited  = (params.get('visited') || '').split(',').filter(Boolean);
  let unlocked = (params.get('unlocked') || '').split(',').filter(Boolean);
  let items    = (params.get('items') || '').split(',').filter(Boolean);
  let log      = params.get('log') || '';  // combination-log notes — forwarded untouched

  const toParams = () => {
    const p = new URLSearchParams();
    p.set('points',   points);
    p.set('visited',  visited.join(','));
    p.set('unlocked', unlocked.join(','));
    p.set('items',    items.join(','));
    p.set('log',      log);
    return p.toString();
  };

  const withState = href => {
    const sep = href.includes('?') ? '&' : '?';
    const hash = href.includes('#') ? '#' + href.split('#')[1] : '';
    const base = href.split('#')[0];
    return base + sep + toParams() + hash;
  };

  const visitZone = (id, pts) => {
    if (!visited.includes(id)) { visited.push(id); points += pts; }
  };
  const unlock  = key => { if (!unlocked.includes(key)) unlocked.push(key); };
  const hasItem = id  => items.includes(id);
  const collectItem = (id, pts = 0) => {
    if (items.includes(id)) return false;
    items.push(id); points += pts; return true;
  };
  const consumeItem = id => { items = items.filter(x => x !== id); };
  const spendPoints = n => { points = Math.max(0, points - n); };

  return { get points(){ return points; }, visited, unlocked, items,
           toParams, withState, visitZone, unlock, hasItem, collectItem, consumeItem, spendPoints };
})();

function computeLakeGeometry() {
  LAKE_MARGIN = Math.min(WORLD_W, WORLD_H) * 0.06;
  lakePoly = LAKE_POLY_NORM.map(([nx, ny]) => [
    LAKE_MARGIN + nx * (WORLD_W - 2 * LAKE_MARGIN),
    LAKE_MARGIN + ny * (WORLD_H - 2 * LAKE_MARGIN)
  ]);
}
computeLakeGeometry();

// Point-in-polygon (ray casting)
function pointInPoly(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    const intersect = ((yi > py) !== (yj > py)) &&
      (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

}

function openDialog(npcId, pages) {
  let resolvedPages = pages;

  if (npcId === 'fisherman') {
    const result = getRaymondDialog();
    resolvedPages = result.pages;
    mode = result.mode;
  }
  currentDialogMode = mode;
  dialogPages = resolvedPages;
  const idx = npcDialogIdx[npcId] || 0;
  const npc = NPCS.find(n => n.id === npcId);
  activeDialog = { npcId, pageIndex: idx };
  const box = document.getElementById('dialogBox');
  box.style.display = 'block';
  document.getElementById('dialogSpeaker').textContent = npc.label;
  document.getElementById('dialogText').textContent = resolvedPages[idx];
  updateDialogPrompt(npcId, idx, resolvedPages, mode);
}

function updateDialogPrompt(npcId, idx, pages, mode) {
  const isLast = idx >= pages.length - 1;
  let prompt = isLast ? '[ A / ▶ Close ]' : '[ A / ▶ Next ]';
  if (npcId === 'fisherman' && mode === 'intro' && isLast) {
    prompt = '[ A = BUY  ·  B = No thanks ]';
  }
  document.getElementById('dialogPrompt').textContent = prompt;
}

function advanceDialog() {
  if (!activeDialog) return;
  const { npcId, pageIndex } = activeDialog;

  // Flash dialog handler
  if (npcId === '__flash__') {
    const nextIdx = pageIndex + 1;
    if (nextIdx >= dialogPages.length) { closeDialog(); return; }
    activeDialog.pageIndex = nextIdx;
    document.getElementById('dialogText').textContent = dialogPages[nextIdx];
    const isLast = nextIdx >= dialogPages.length - 1;
    document.getElementById('dialogPrompt').textContent = isLast ? '[ A / ▶ Close ]' : '[ A / ▶ Next ]';
    return;
  }

  // Purchase confirmation — last page of intro mode
  if (npcId === 'fisherman' && currentDialogMode === 'intro' && pageIndex >= dialogPages.length - 1) {
    GameState.spendPoints(25);
    GameState.collectItem('fishing-rod', 0);
    document.getElementById('pointsDisplay').textContent = GameState.points;
    npcDialogIdx[npcId] = 0;
    closeDialog();
    showFlashDialog('🎣 RAYMOND',
      "She's all yours! The Flux Capacitor — treat her well.",
      "Greatest fishing rod ever made. And yes, the name is intentional.",
      "Now get out there and find yourself a fish!"
    );
    return;
  }

  const nextIdx = pageIndex + 1;
  if (nextIdx >= dialogPages.length) {
    npcDialogIdx[npcId] = 0;
    closeDialog();
  } else {
    npcDialogIdx[npcId] = nextIdx;
    activeDialog.pageIndex = nextIdx;
    document.getElementById('dialogText').textContent = dialogPages[nextIdx];
    updateDialogPrompt(npcId, nextIdx, dialogPages, currentDialogMode);
  }
}

function closeDialog() {
  activeDialog = null;
  currentDialogMode = null;
  document.getElementById('dialogBox').style.display = 'none';
}

// Flash dialog — one-off multi-page dialog with no NPC state tracking
function showFlashDialog(speaker, ...pages) {
  dialogPages = pages;
  const box = document.getElementById('dialogBox');
  box.style.display = 'block';
  document.getElementById('dialogSpeaker').textContent = speaker;
  document.getElementById('dialogText').textContent = pages[0];
  document.getElementById('dialogPrompt').textContent = pages.length > 1 ? '[ A / ▶ Next ]' : '[ A / ▶ Close ]';
  activeDialog = { npcId: '__flash__', pageIndex: 0 };
  currentDialogMode = null;
}

// ─────────────────────────────────────────────
//  INTERACT
// ─────────────────────────────────────────────
function handleInteract() {
  if (menuOpen) { closeMenu(); return; }
  if (photoOpen) { closePhotoSpot(); return; }
  if (activeDialog) { advanceDialog(); return; }

  // Check photo spots (Andre's real photos — not a game item)
  for (const spot of PHOTO_SPOTS) {
    const sp = lakePoint(spot.nx, spot.ny);
    if (Math.hypot(playerX - sp.x, playerY - sp.y) < spot.r + 24) {
      openPhotoSpot(spot);
      return;
    }
  }

  // Check boat landing exit
  const lp = lakePoint(LANDING.nx, LANDING.ny);
  if (Math.hypot(playerX - lp.x, playerY - lp.y) < LANDING.r + 24) {
    navigate(GameState.withState('world.html#spawn=lake-tahoe'));
    return;
  }

  // Check NPCs
  for (const npc of NPCS) {
    const np = lakePoint(npc.nx, npc.ny);
    if (Math.hypot(playerX - np.x, playerY - np.y) < 60) {
      openDialog(npc.id, npc.dialog);
      return;
    }
  }

  // Check hidden fish item (only catchable with fishing rod)
  const fp = lakePoint(FISH_ITEM.nx, FISH_ITEM.ny);
  if (Math.hypot(playerX - fp.x, playerY - fp.y) < FISH_ITEM.r + 20) {
    if (!GameState.hasItem('fishing-rod')) {
      showFlashDialog('🐟 ???', "Something stirs beneath the surface...", "You'll need a fishing rod to catch it.");
    } else if (GameState.hasItem('tahoe-fish')) {
      showFlashDialog('🐟 TAHOE TROUT', "You already caught this one. Catch and release!");
    } else {
      GameState.collectItem('tahoe-fish', 25);
      document.getElementById('pointsDisplay').textContent = GameState.points;
      showFlashDialog('🐟 TAHOE TROUT',
        "Got one! A beautiful Tahoe cutthroat trout!",
        "★ +25 points — Tahoe Trout added to inventory!",
        "Raymond would be proud."
      );
    }
    return;
  }
}

function navigate(href) {
  window.location.href = href;
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update(dt) {
  if (menuOpen || activeDialog || inventoryOpen || photoOpen) return;

  let dx = 0, dy = 0;
  if (keys['ArrowUp']    || keys['w']) { dy = -1; playerDir = 'up'; }
  if (keys['ArrowDown']  || keys['s']) { dy =  1; playerDir = 'down'; }
  if (keys['ArrowLeft']  || keys['a']) { dx = -1; playerDir = 'left'; }
  if (keys['ArrowRight'] || keys['d']) { dx =  1; playerDir = 'right'; }

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  const spd = PLAYER_SPEED;
  const nx = playerX + dx * spd;
  const ny = playerY + dy * spd;

  if (pointInPoly(nx, ny, lakePoly)) {
    playerX = nx;
    playerY = ny;
  } else if (pointInPoly(nx, playerY, lakePoly)) {
    playerX = nx;
  } else if (pointInPoly(playerX, ny, lakePoly)) {
    playerY = ny;
  }

  // Animate
  if (dx !== 0 || dy !== 0) {
    frameTimer += dt;
    if (frameTimer > 200) { playerFrame = (playerFrame + 1) % 4; frameTimer = 0; }
  } else {
    playerFrame = 0;
  }

  waveOffset += dt * 0.0008;
  fishBobOffset = Math.sin(Date.now() * 0.002) * 3;
  document.getElementById('pointsDisplay').textContent = GameState.points;

  // ── CAMERA — follow player, clamp to world bounds ──
  const targetCamX = playerX - canvas.width / 2;
  const targetCamY = playerY - canvas.height / 2;
  camX = Math.max(0, Math.min(targetCamX, WORLD_W - canvas.width));
  camY = Math.max(0, Math.min(targetCamY, WORLD_H - canvas.height));
}

function drawPineTree(cx, cy, h) {
  const w = h * 0.55;
  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + h * 0.05, w * 0.35, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Trunk
  ctx.fillStyle = '#6b3a1f';
  ctx.fillRect(cx - h * 0.06, cy - h * 0.05, h * 0.12, h * 0.2);

  // Layers of foliage (darker evergreen)
  const layers = [
    { y: 0.00, wr: 1.00, fill: '#1a4a1a' },
    { y: 0.20, wr: 0.82, fill: '#1e5a1e' },
    { y: 0.38, wr: 0.64, fill: '#246424' },
    { y: 0.54, wr: 0.46, fill: '#2a6e2a' },
    { y: 0.68, wr: 0.30, fill: '#307830' },
  ];
  for (const l of layers) {
    ctx.fillStyle = l.fill;
    ctx.beginPath();
    ctx.moveTo(cx, cy - h + l.y * h * 0.7);
    ctx.lineTo(cx - w * l.wr, cy - h * 0.1 + l.y * h * 0.7);
    ctx.lineTo(cx + w * l.wr, cy - h * 0.1 + l.y * h * 0.7);
    ctx.closePath();
    ctx.fill();
    // Snow caps on top two layers
    if (l.y < 0.22) {
      ctx.fillStyle = 'rgba(230,240,255,0.55)';
      ctx.beginPath();
      ctx.moveTo(cx, cy - h + l.y * h * 0.7);
      ctx.lineTo(cx - w * l.wr * 0.35, cy - h * 0.1 + l.y * h * 0.7 - h * 0.06);
      ctx.lineTo(cx + w * l.wr * 0.35, cy - h * 0.1 + l.y * h * 0.7 - h * 0.06);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawGraniteBoulder(cx, cy, r) {
  // Shadow

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.22)';

  ctx.ellipse(cx - r * 0.28, cy - r * 0.22, r * 0.35, r * 0.18, -0.4, 0, Math.PI * 2);

}

function drawLogCabin(cx, cy, w, h) {
  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx + w * 0.05, cy + h * 0.08, w * 0.55, h * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Walls (log texture)
  const wallGrad = ctx.createLinearGradient(cx - w/2, cy - h/2, cx + w/2, cy - h/2);
  wallGrad.addColorStop(0, '#7a4a20');
  wallGrad.addColorStop(0.5, '#9a6030');
  wallGrad.addColorStop(1, '#6a3a10');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(cx - w/2, cy - h * 0.65, w, h * 0.65);

  // Log lines
  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 5; i++) {
    const ly = cy - h * 0.65 + i * (h * 0.65 / 5);
    ctx.beginPath();
    ctx.moveTo(cx - w/2, ly);
    ctx.lineTo(cx + w/2, ly);
    ctx.stroke();
  }

  // Roof
  ctx.fillStyle = '#4a2808';
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.62, cy - h * 0.65);
  ctx.lineTo(cx, cy - h);
  ctx.lineTo(cx + w * 0.62, cy - h * 0.65);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#3a1f06';
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.55, cy - h * 0.65);
  ctx.lineTo(cx, cy - h * 0.95);
  ctx.lineTo(cx + w * 0.55, cy - h * 0.65);
  ctx.closePath();
  ctx.fill();

  // Door
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(cx - w * 0.1, cy - h * 0.32, w * 0.2, h * 0.32);

  // Window
  ctx.fillStyle = '#ffd080';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(cx + w * 0.18, cy - h * 0.52, w * 0.18, h * 0.2);
  ctx.fillRect(cx - w * 0.36, cy - h * 0.52, w * 0.18, h * 0.2);
  ctx.globalAlpha = 1;

  // Chimney
  ctx.fillStyle = '#6a6060';
  ctx.fillRect(cx + w * 0.2, cy - h * 1.05, w * 0.12, h * 0.45);
  // Smoke
  ctx.fillStyle = 'rgba(200,200,200,0.3)';
  for (let i = 0; i < 3; i++) {
    const sy = cy - h * 1.05 - i * 6 - Math.sin(waveOffset * 3 + i) * 3;
    ctx.beginPath();
    ctx.arc(cx + w * 0.26 + Math.sin(waveOffset * 2 + i * 1.2) * 3, sy, 4 + i * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawKayakPlayer(x, y, dir, frame) {
  const t = Date.now() * 0.003;
  const bob = Math.sin(t) * 1.5;
  y += bob;

  // Kayak body (light blue)
  ctx.save();
  ctx.translate(x, y);

  const isH = dir === 'left' || dir === 'right';
  if (isH) ctx.rotate(dir === 'right' ? 0.08 : -0.08);

  // Kayak hull
  ctx.fillStyle = '#5ab8e8';
  ctx.beginPath();
  if (dir === 'up' || dir === 'down') {
    ctx.ellipse(0, 0, 10, 22, 0, 0, Math.PI * 2);
  } else {
    ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2);
  }
  ctx.fill();

  // Kayak shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  if (dir === 'up' || dir === 'down') {
    ctx.ellipse(-3, -6, 4, 8, -0.2, 0, Math.PI * 2);
  } else {
    ctx.ellipse(-6, -3, 8, 4, -0.2, 0, Math.PI * 2);
  }
  ctx.fill();

  // Kayak cockpit
  ctx.fillStyle = '#d4a820';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Player figure (tiny pixel person)
  ctx.fillStyle = '#f4a060'; // skin
  ctx.beginPath();
  ctx.arc(0, -4, 4, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#4060c0';
  ctx.fillRect(-3, -1, 6, 7);

  // Paddle animation
  const paddleOffset = Math.sin(frame * Math.PI / 2) * 8;
  ctx.strokeStyle = '#8b5a20';
  ctx.lineWidth = 2;
  if (dir === 'left' || dir === 'right') {
    ctx.beginPath();
    ctx.moveTo(-18 + (dir === 'right' ? paddleOffset : -paddleOffset), -paddleOffset * 0.5);
    ctx.lineTo(18 + (dir === 'right' ? paddleOffset : -paddleOffset), paddleOffset * 0.5);
    ctx.stroke();
    // Paddle blades
    ctx.fillStyle = '#c07030';
    ctx.beginPath();
    ctx.ellipse(-18 + (dir === 'right' ? paddleOffset : -paddleOffset), -paddleOffset * 0.5, 6, 3, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(18 + (dir === 'right' ? paddleOffset : -paddleOffset), paddleOffset * 0.5, 6, 3, 0.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-paddleOffset * 0.5, -18 + (dir === 'down' ? paddleOffset : -paddleOffset));
    ctx.lineTo(paddleOffset * 0.5, 18 + (dir === 'down' ? paddleOffset : -paddleOffset));
    ctx.stroke();
    ctx.fillStyle = '#c07030';
    ctx.beginPath();
    ctx.ellipse(-paddleOffset * 0.5, -18 + (dir === 'down' ? paddleOffset : -paddleOffset), 3, 6, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(paddleOffset * 0.5, 18 + (dir === 'down' ? paddleOffset : -paddleOffset), 3, 6, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wake ripples
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 2; i++) {
    ctx.beginPath();
    ctx.ellipse(0, i * 12, 8 + i * 4, 3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

  ctx.textAlign = 'center';
  ctx.fillText('▲ TALK', x, y - 18);
  ctx.restore();
}

// Camera beacon marking a photo spot (pulsing gold ring + camera glyph)
function drawPhotoBeacon(x, y) {
  const t = Date.now() * 0.003;
  ctx.save();
  // Pulsing ring
  const pulse = 14 + Math.sin(t) * 4;
  ctx.strokeStyle = 'rgba(240,192,64,' + (0.5 + 0.3 * Math.sin(t)) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, pulse, 0, Math.PI * 2);
  ctx.stroke();
  // Dark disc behind glyph for legibility on bright water
  ctx.fillStyle = 'rgba(13,10,24,0.6)';
  ctx.beginPath();
  ctx.arc(x, y, 11, 0, Math.PI * 2);
  ctx.fill();
  // Camera glyph
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📷', x, y + 1);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  MAIN DRAW
// ─────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── WORLD SPACE (camera-translated) ──
  ctx.save();
  ctx.translate(-camX, -camY);

  // ── LAND BACKGROUND ──
  const landGrad = ctx.createRadialGradient(WORLD_W/2, WORLD_H/6, 0, WORLD_W/2, WORLD_H/6, Math.max(WORLD_W, WORLD_H) * 0.8);
  landGrad.addColorStop(0, '#2a3a20');
  landGrad.addColorStop(0.4, '#1e2e18');
  landGrad.addColorStop(1, '#0f1a0a');
  ctx.fillStyle = landGrad;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // ── DECORATIONS (behind lake) ──
  // Pine trees
  for (const [nx, ny] of DECO.pines) {
    const px = LAKE_MARGIN + nx * (WORLD_W - 2 * LAKE_MARGIN);
    const py = LAKE_MARGIN + ny * (WORLD_H - 2 * LAKE_MARGIN);
    const sz = 28 + Math.abs(Math.sin(nx * 17 + ny * 31)) * 18;
    drawPineTree(px, py, sz);
  }

  // Cabins
  for (const [nx, ny] of DECO.cabins) {
    const px = LAKE_MARGIN + nx * (WORLD_W - 2 * LAKE_MARGIN);
    const py = LAKE_MARGIN + ny * (WORLD_H - 2 * LAKE_MARGIN);
    drawLogCabin(px, py, 52, 44);
  }

  // Boulders
  for (const [nx, ny] of DECO.boulders) {
    const px = LAKE_MARGIN + nx * (WORLD_W - 2 * LAKE_MARGIN);
    const py = LAKE_MARGIN + ny * (WORLD_H - 2 * LAKE_MARGIN);
    const r = 12 + Math.abs(Math.sin(nx * 13 + ny * 23)) * 10;
    drawGraniteBoulder(px, py, r);
  }

  // ── LAKE WATER ──
  // Clip to lake polygon, fill with animated dark blue
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lakePoly[0][0], lakePoly[0][1]);
  for (let i = 1; i < lakePoly.length; i++) ctx.lineTo(lakePoly[i][0], lakePoly[i][1]);
  ctx.closePath();
  ctx.clip();

  // Base water fill
  const waterGrad = ctx.createLinearGradient(WORLD_W * 0.2, WORLD_H * 0.02, WORLD_W * 0.8, WORLD_H * 0.32);
  waterGrad.addColorStop(0, '#0d2d60');
  waterGrad.addColorStop(0.35, '#0a2050');
  waterGrad.addColorStop(0.65, '#081840');
  waterGrad.addColorStop(1, '#061030');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // Wave lines (subtle horizontal shimmer)
  ctx.strokeStyle = 'rgba(40,100,200,0.18)';
  ctx.lineWidth = 1.2;
  const lakeH = WORLD_H;
  for (let row = 0; row < 30; row++) {
    const wy = lakeH * 0.05 + row * lakeH * 0.03;
    const phase = waveOffset + row * 0.4;
    ctx.beginPath();
    for (let xi = 0; xi < WORLD_W; xi += 4) {
      const yd = Math.sin((xi / WORLD_W) * 8 + phase) * 2 + Math.cos((xi / WORLD_W) * 5 + phase * 1.3) * 1.5;
      xi === 0 ? ctx.moveTo(xi, wy + yd) : ctx.lineTo(xi, wy + yd);
    }
    ctx.stroke();
  }

  // Sparkle highlights
  ctx.fillStyle = 'rgba(180,220,255,0.12)';
  const sparkCount = 28;
  for (let i = 0; i < sparkCount; i++) {
    const sx = WORLD_W * (0.15 + (i * 0.618 % 0.7));
    const sy = lakeH * (0.08 + ((i * 0.382) % 0.84));
    const sw = 2 + Math.sin(waveOffset * 2 + i) * 1;
    const salpha = Math.abs(Math.sin(waveOffset * 1.5 + i * 0.7)) * 0.5;
    ctx.globalAlpha = salpha;
    ctx.fillRect(sx, sy, sw, sw * 0.4);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ── LAKE SHORE EDGE (soft glow) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lakePoly[0][0], lakePoly[0][1]);
  for (let i = 1; i < lakePoly.length; i++) ctx.lineTo(lakePoly[i][0], lakePoly[i][1]);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(80,150,255,0.35)';
  ctx.lineWidth = 6;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(120,200,255,0.15)';
  ctx.lineWidth = 14;
  ctx.stroke();
  ctx.restore();

  // ── BOAT LANDING ──
  const lp = lakePoint(LANDING.nx, LANDING.ny);
  drawBoatLanding(lp.x, lp.y);

  // ── NPCs ──
  for (const npc of NPCS) {
    const np = lakePoint(npc.nx, npc.ny);
    if (npc.id === 'fish')       drawFishNPC(np.x, np.y);
    else if (npc.id === 'bear')  drawBearNPC(np.x, np.y);
    else if (npc.id === 'fisherman') drawFishermanNPC(np.x, np.y);

    // Proximity prompt
    if (!activeDialog && !menuOpen) {
      const dist = Math.hypot(playerX - np.x, playerY - np.y);
      if (dist < 65) drawInteractPrompt(np.x, np.y, npc.label);
    }
  }

  // ── PHOTO SPOTS (camera beacons) ──
  for (const spot of PHOTO_SPOTS) {
    const sp = lakePoint(spot.nx, spot.ny);
    drawPhotoBeacon(sp.x, sp.y);
    if (!activeDialog && !menuOpen && !photoOpen) {
      if (Math.hypot(playerX - sp.x, playerY - sp.y) < spot.r + 24) {
        ctx.save();
        const alpha = 0.5 + 0.4 * Math.sin(Date.now() * 0.004);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#f0c040';
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('▲ VIEW PHOTOS', sp.x, sp.y - 30);
        ctx.restore();
      }
    }
  }

  // Boat landing proximity prompt
  if (!activeDialog && !menuOpen) {
    if (Math.hypot(playerX - lp.x, playerY - lp.y) < LANDING.r + 24) {
      ctx.save();
      const alpha = 0.5 + 0.4 * Math.sin(Date.now() * 0.004);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#f0c040';
      ctx.font = '8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▲ EXIT MAP', lp.x, lp.y - 38);
      ctx.restore();
    }
  }

  // ── HIDDEN FISH ITEM ──
  if (!GameState.hasItem('tahoe-fish')) {
    const fp = lakePoint(FISH_ITEM.nx, FISH_ITEM.ny);
    if (GameState.hasItem('fishing-rod')) {
      // Visible + bobbing when player has the rod
      ctx.save();
      ctx.globalAlpha = 0.6 + 0.3 * Math.sin(Date.now() * 0.003);
      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐟', fp.x, fp.y + Math.sin(Date.now() * 0.002) * 3);
      ctx.restore();
      if (!activeDialog && !menuOpen && Math.hypot(playerX - fp.x, playerY - fp.y) < FISH_ITEM.r + 20) {
        drawInteractPrompt(fp.x, fp.y - 14, '🐟 CATCH');
      }
    } else {
      // Subtle ripple — teaser with no rod
      ctx.save();
      ctx.globalAlpha = 0.12 + 0.08 * Math.sin(Date.now() * 0.002);
      ctx.strokeStyle = '#80d0ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(fp.x, fp.y, 18, 7, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── PLAYER ──
  drawKayakPlayer(playerX, playerY, playerDir, playerFrame);

  // ── END WORLD SPACE ──
  ctx.restore();

  // ── HUD (screen space) ──
  // Location label
  ctx.save();
  ctx.fillStyle = 'rgba(13,10,24,0.7)';
  ctx.fillRect(W / 2 - 90, 10, 180, 22);
  ctx.strokeStyle = '#1040a0';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(W / 2 - 90, 10, 180, 22);
  ctx.fillStyle = '#80c0ff';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🏔 LAKE TAHOE', W / 2, 26);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  INVENTORY
// ─────────────────────────────────────────────
const ITEMS = [
  {id:'holy-grail',    icon:'🏆', label:'Holy Grail',         category:'quest',       points:50, page:'Castle Anthrax'},
  {id:'skeleton-key',  icon:'🔑', label:'Skeleton Key',        category:'key',         points:30, page:'World Map'},
  {id:'sword',         icon:'⚔️', label:'Sword',               category:'quest',       points:25, page:'Erebor Mountain'},
  {id:'cert-badge',    icon:'📜', label:'Certification Badge', category:'collectible', points:20, page:'My Story'},
  {id:'first-edition', icon:'📖', label:'First Edition',       category:'collectible', points:20, page:'Scroll Library'},
  {id:'fishing-rod',   icon:'🎣', label:'Fishing Rod',         category:'collectible', points:15, page:'Lake Tahoe'},
  {id:'tahoe-fish',    icon:'🐟', label:'Tahoe Trout',         category:'collectible', points:25, page:'Lake Tahoe'},
  {id:'blue-kayak',    icon:'🚣', label:'Blue Kayak',          category:'quest',       points:15, page:'Castle Anthrax'},
  {id:'artwork',       icon:'🖼️', label:'Artwork',             category:'collectible', points:10, page:'Town Square'},
  {id:'bread',         icon:'🍞', label:'Bread',               category:'collectible', points:10, page:'Town Square'},
  {id:'old-compass',   icon:'🧭', label:'Old Compass',         category:'collectible', points:10, page:'The Lake'},
  {id:'sapphire',      icon:'💎', label:'Sapphire',            category:'key',         points:75, page:'World Map'},
  {id:'ruby',          icon:'🔴', label:'Ruby',                category:'key',         points:75, page:'World Map'},
];

let inventoryOpen = false;
let selectedItemId = null;
function toggleInventory() { inventoryOpen ? closeInventory() : openInventory(); }
function openInventory() {
  if (activeDialog) closeDialog();
  if (menuOpen) closeMenu();
  inventoryOpen = true;
  selectedItemId = null;
  document.getElementById('btnSelect').classList.add('pressed');
  const overlay = document.getElementById('inventory-overlay');
  overlay.style.bottom = CTRL_H() + 'px';
  overlay.classList.add('open');
  renderItemList();
  renderItemDetail(null);
}
function closeInventory() {
  inventoryOpen = false;
  selectedItemId = null;
  document.getElementById('inventory-overlay').classList.remove('open');
  document.getElementById('btnSelect').classList.remove('pressed');
}
function selectItem(id) {
  selectedItemId = id;
  renderItemList();
  renderItemDetail(id);
}
function renderItemList() {
  const total = ITEMS.reduce((s, i) => s + i.points, 0);
  document.getElementById('inv-header-pts').textContent =
    'Points: ' + GameState.points + ' / ' + total;
  const list = document.getElementById('inv-items-list');
  list.innerHTML = '';
  [{key:'quest',label:'QUEST ITEMS'},{key:'key',label:'KEY ITEMS'},{key:'collectible',label:'COLLECTIBLES'}]
    .forEach(cat => {
      const catItems = ITEMS.filter(i => i.category === cat.key);
      if (!catItems.length) return;
      const h = document.createElement('div');
      h.className = 'inv-category'; h.textContent = cat.label; list.appendChild(h);
      catItems.forEach(item => {
        const got = GameState.hasItem(item.id);
        const hasDetail = got && item.pages && item.pages.length > 0;
        const row = document.createElement('div');
        row.className = 'inv-row' +
          (got ? '' : ' locked') +
          (hasDetail ? ' has-content' : '') +
          (selectedItemId === item.id ? ' selected' : '');
        const icon = document.createElement('div'); icon.className = 'inv-row-icon';
        icon.textContent = got ? item.icon : '❓';
        const info = document.createElement('div'); info.className = 'inv-row-info';
        const name = document.createElement('div');
        name.className = 'inv-row-name' + (got ? '' : ' locked-name');
        name.textContent = got ? item.label : '???';
        const pts = document.createElement('div'); pts.className = 'inv-row-pts';
        pts.textContent = item.points + ' pts';
        info.append(name, pts);
        const badge = document.createElement('div');
        badge.className = 'inv-row-badge ' + (got ? 'obtained' : 'locked-badge');
        badge.textContent = got ? '✓' : '🔒';
        row.append(icon, info, badge);
        if (hasDetail) row.addEventListener('click', () => selectItem(item.id));
        list.appendChild(row);
      });
    });
}
function renderItemDetail(id) {
  const empty = document.getElementById('inv-detail-empty');
  const content = document.getElementById('inv-detail-content');
  if (!id) {
    empty.style.display = 'flex';
    content.classList.remove('visible');
    return;
  }
  const item = ITEMS.find(i => i.id === id);
  if (!item || !GameState.hasItem(id)) {
    empty.style.display = 'flex';
    content.classList.remove('visible');
    return;
  }
  empty.style.display = 'none';
  content.classList.add('visible');
  document.getElementById('inv-detail-icon').textContent = item.icon;
  document.getElementById('inv-detail-name').textContent = item.label;
  document.getElementById('inv-detail-category').textContent = item.category.toUpperCase();
  document.getElementById('inv-detail-pts').textContent = '★ ' + item.points + ' pts';
  const pagesEl = document.getElementById('inv-detail-pages');
  pagesEl.innerHTML = '';
  (item.pages || []).forEach(p => {
    const pageDiv = document.createElement('div'); pageDiv.className = 'inv-detail-page';
    const heading = document.createElement('div'); heading.className = 'inv-detail-page-heading';
    heading.textContent = p.heading;
    const body = document.createElement('div'); body.className = 'inv-detail-page-body';
    body.textContent = p.body;
    pageDiv.append(heading, body);
    pagesEl.appendChild(pageDiv);
  });
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─────────────────────────────────────────────
//  Visit zone on load
// ─────────────────────────────────────────────
GameState.visitZone('lake-tahoe', 0);
</script>
