<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lake — Andre Gurule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0c040;
    --ui-bg: #0d0a18;
    --ui-text: #f0e8c0;
    --lake-deep: #0d4848;
    --lake-mid: #1a7060;
    --controller-h: 160px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a2a10;
    font-family: 'Press Start 2P', monospace;
    color: var(--ui-text);
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: calc(100vh - var(--controller-h));
    image-rendering: pixelated;
    cursor: crosshair;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 10px; left: 10px;
    z-index: 100;
    pointer-events: none;
  }
  #pointsBadge {
    background: rgba(13,10,24,0.85);
    border: 2px solid var(--gold);
    padding: 4px 10px;
    font-size: clamp(7px, 1.5vw, 10px);
    color: var(--gold);
    border-radius: 4px;
  }

  /* ── DIALOG ── */
  #dialogBox {
    display: none;
    position: fixed;
    bottom: calc(var(--controller-h) + 12px);
    left: 50%; transform: translateX(-50%);
    width: min(640px, 94vw);
    background: var(--ui-bg);
    border: 3px solid var(--gold);
    border-radius: 6px;
    padding: 14px 18px 12px;
    z-index: 200;
    font-family: 'VT323', monospace;
    font-size: clamp(16px, 3.5vw, 22px);
    color: var(--ui-text);
    line-height: 1.5;
  }
  #dialogBox .speaker {
    color: var(--gold);
    font-size: clamp(11px, 2vw, 15px);
    margin-bottom: 6px;
    font-family: 'Press Start 2P', monospace;
  }
  #dialogBox .prompt {
    color: #80d0a0;
    font-size: clamp(10px, 1.8vw, 13px);
    margin-top: 8px;
    font-family: 'Press Start 2P', monospace;
  }

  /* ── MENU OVERLAY ── */
  #menuOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,10,24,0.92);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  #menuOverlay.open { display: flex; }
  #menuOverlay h2 {
    font-size: clamp(11px, 2.2vw, 16px);
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .menu-btn {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--ui-text);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 1.8vw, 12px);
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: 4px;
    text-decoration: none;
    display: block;
    text-align: center;
    min-width: 220px;
  }
  .menu-btn:hover { background: var(--gold); color: var(--ui-bg); }

  /* ── NES CONTROLLER ── */
  #nes-controller{position:fixed;bottom:0;left:0;right:0;z-index:600;display:flex;flex-direction:column;align-items:center;gap:8px;background:#0d0a18;padding:clamp(8px,1.5vh,16px) 0 clamp(8px,1.5vh,14px);border-top:2px solid #2a2040;}
  #controller-body{position:relative;width:clamp(388.8px,60.75vw,518.4px);height:clamp(90px,14vw,120px);background:linear-gradient(180deg,#3a3a40 0%,#2e2e34 60%,#252528 100%);border-radius:6px 6px 10px 10px;border:2px solid #555;box-shadow:0 4px 18px rgba(0,0,0,0.7),0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08),inset 0 -2px 0 rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,28px);}
  #controller-body::before{content:'';position:absolute;top:10px;left:12px;right:12px;height:2px;background:rgba(255,255,255,0.05);border-radius:1px;}
  #controller-body::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:clamp(60px,12vw,90px);height:6px;background:rgba(255,255,255,0.04);border-radius:3px;}
  #dpad{position:relative;width:clamp(70px,13vw,96px);height:clamp(70px,13vw,96px);flex-shrink:0;}
  .dpad-h,.dpad-v{position:absolute;background:linear-gradient(180deg,#4c4c56,#38383f);border:2.5px solid #1a1a20;border-radius:3px;}
  .dpad-h{left:0;right:0;top:33.3%;bottom:33.3%;box-shadow:inset 0 2px 0 rgba(255,255,255,0.09),inset 0 -2px 0 rgba(0,0,0,0.4);}
  .dpad-v{top:0;bottom:0;left:33.3%;right:33.3%;box-shadow:inset 2px 0 0 rgba(255,255,255,0.09),inset -2px 0 0 rgba(0,0,0,0.4);}
  .dpad-center{position:absolute;left:33.3%;right:33.3%;top:33.3%;bottom:33.3%;background:#3c3c44;border-radius:2px;z-index:2;}
  .dpad-btn{position:absolute;z-index:3;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;}
  #btn-up{top:0;left:33.3%;right:33.3%;height:33.3%;}
  #btn-down{bottom:0;left:33.3%;right:33.3%;height:33.3%;}
  #btn-left{left:0;top:33.3%;bottom:33.3%;width:33.3%;}
  #btn-right{right:0;top:33.3%;bottom:33.3%;width:33.3%;}
  #btn-up::after{content:'▲';}#btn-down::after{content:'▼';}
  #btn-left::after{content:'◀';}#btn-right::after{content:'▶';}
  .dpad-btn::after{font-size:clamp(8px,1.6vw,12px);color:rgba(255,255,255,0.3);}
  .dpad-btn.pressing::after{color:var(--gold);text-shadow:0 0 7px var(--gold);}
  #center-section{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vw,10px);flex-shrink:0;margin-left:clamp(8px,2vw,16px);margin-right:clamp(0px,1vw,8px);}
  #select-start-row{display:flex;gap:clamp(8px,1.8vw,14px);align-items:center;}
  .ss-btn{width:clamp(32px,6vw,46px);height:clamp(10px,2vw,14px);background:linear-gradient(180deg,#3a3a42,#28282e);border:1.5px solid #1a1a20;border-radius:clamp(5px,1vw,7px);box-shadow:0 2px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.07);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,box-shadow 0.06s;}
  .ss-btn:active,.ss-btn.pressed{transform:translateY(1px);box-shadow:none;}
  .ss-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.8vw,6px);color:#666;letter-spacing:0.5px;margin-top:clamp(2px,0.5vh,4px);text-align:center;}
  #menu-btn-wrap{display:flex;flex-direction:column;align-items:center;}
  #btnMenu{width:clamp(36px,6.5vw,50px);height:clamp(36px,6.5vw,50px);border-radius:50%;background:radial-gradient(circle at 42% 38%,#4a4a54,#26262e);border:2.5px solid #1a1a20;box-shadow:0 3px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1),0 0 0 3px rgba(240,192,64,0.15);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,box-shadow 0.06s;}
  #btnMenu:hover{box-shadow:0 3px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.1),0 0 0 4px rgba(240,192,64,0.35);}
  #btnMenu:active,#btnMenu.pressed{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.55);}
  #menu-btn-icon{font-family:'Press Start 2P',monospace;font-size:clamp(5px,0.9vw,7px);color:rgba(240,192,64,0.85);letter-spacing:0.5px;line-height:1.3;text-align:center;}
  #menu-btn-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.7vw,5px);color:#c8982a;margin-top:4px;letter-spacing:0.5px;}
  #ab-buttons{display:flex;gap:clamp(8px,1.8vw,14px);align-items:center;flex-shrink:0;transform:rotate(-18deg);}
  .ab-btn{width:clamp(36px,6.5vw,50px);height:clamp(36px,6.5vw,50px);border-radius:50%;border:2.5px solid #1a1a20;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:clamp(9px,1.6vw,12px);cursor:pointer;touch-action:manipulation;user-select:none;box-shadow:0 4px 0 rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.15);transition:transform 0.06s,box-shadow 0.06s;-webkit-tap-highlight-color:transparent;}
  .ab-btn:active,.ab-btn.pressed{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,0.55);}
  #btnB{background:radial-gradient(circle at 40% 35%,#cc4466,#aa2244);color:rgba(255,255,255,0.85);}
  #btnA{background:radial-gradient(circle at 40% 35%,#cc4466,#aa2244);color:rgba(255,255,255,0.85);}
  .ab-label-row{display:flex;gap:clamp(8px,1.8vw,14px);transform:rotate(-18deg);margin-top:clamp(2px,0.5vh,4px);}
  .ab-label{font-family:'Press Start 2P',monospace;font-size:clamp(4px,0.7vw,5px);color:#555;width:clamp(36px,6.5vw,50px);text-align:center;}
  #ab-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  #ctrl-hint{font-family:'VT323',monospace;font-size:clamp(10px,1.8vw,13px);color:var(--gold);text-align:center;opacity:0.75;}

  /* ── INVENTORY OVERLAY ── */
  #inventory-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,8,24,0.95);
    backdrop-filter: blur(4px);
    z-index: 400;
    align-items: flex-start;
    justify-content: center;
    padding: clamp(12px,2vh,24px) clamp(8px,2vw,16px);
    overflow-y: auto;
  }
  #inventory-overlay.open { display: flex; }
  #inventory-box {
    background: var(--ui-bg);
    border: 4px solid var(--gold);
    padding: clamp(16px,3vw,28px) clamp(18px,3.5vw,32px);
    width: min(700px, 96vw);
    position: relative;
  }
  #inventory-box::before {
    content: '';
    position: absolute; inset: 3px;
    border: 1px solid rgba(240,192,64,0.22);
    pointer-events: none;
  }
  #inventory-title {
    font-size: clamp(9px,1.6vw,13px);
    color: var(--gold);
    text-align: center;
    margin-bottom: clamp(6px,1.2vh,12px);
    letter-spacing: 2px;
  }
  #inventory-subtitle {
    font-family: 'VT323', monospace;
    font-size: clamp(14px,2.5vw,18px);
    color: #a09070;
    text-align: center;
    margin-bottom: clamp(12px,2vh,20px);
    border-bottom: 1px solid rgba(240,192,64,0.18);
    padding-bottom: clamp(8px,1.5vh,14px);
  }
  #inventory-points-banner {
    font-family: 'VT323', monospace;
    font-size: clamp(16px,3vw,22px);
    color: var(--gold);
    text-align: center;
    margin-bottom: clamp(10px,1.8vh,18px);
  }
  .inv-category {
    font-size: clamp(6px,1vw,8px);
    color: #a09070;
    letter-spacing: 2px;
    margin: clamp(10px,1.8vh,16px) 0 clamp(6px,1vh,10px);
    border-bottom: 1px solid rgba(240,192,64,0.12);
    padding-bottom: 4px;
  }
  .inv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(140px,22vw,200px), 1fr));
    gap: clamp(6px,1.2vw,12px);
    margin-bottom: clamp(8px,1.5vh,14px);
  }
  .inv-item {
    border: 2px solid rgba(240,192,64,0.18);
    padding: clamp(8px,1.4vw,12px);
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
  }
  .inv-item.obtained { border-color: rgba(240,192,64,0.6); }
  .inv-item.locked   { opacity: 0.45; }
  .inv-icon     { font-size: clamp(18px,3.5vw,26px); line-height: 1; }
  .inv-name     { font-size: clamp(5px,0.9vw,7px); color: var(--ui-text); line-height: 1.4; }
  .inv-name.locked-name { color: #a09070; }
  .inv-location { font-family: 'VT323', monospace; font-size: clamp(11px,2vw,14px); color: #a09070; }
  .inv-pts      { font-size: clamp(5px,0.85vw,7px); color: var(--gold); margin-top: 2px; }
  .inv-check    { position: absolute; top: 6px; right: 8px; font-size: clamp(10px,1.8vw,14px); color: #40c060; }
  .inv-lock     { position: absolute; top: 6px; right: 8px; font-size: clamp(9px,1.6vw,12px); color: #554433; }
  #inventory-close-hint {
    text-align: center;
    margin-top: clamp(12px,2vh,20px);
    font-size: clamp(5px,0.8vw,7px);
    color: #a09070;
  }
  .oval-btn.pressed { background: #4a4a80; }
</style>

<body>

<div id="hud"><div id="pointsBadge">★ <span id="pointsDisplay">0</span></div></div>

<div id="dialogBox">
  <div class="speaker" id="dialogSpeaker"></div>
  <div id="dialogText"></div>
  <div class="prompt" id="dialogPrompt"></div>
</div>

<div id="menuOverlay">
  <h2>🌊 THE LAKE</h2>
  <a class="menu-btn" id="menuWorldLink" href="world.html#spawn=the-lake">🗺 WORLD MAP</a>
  <a class="menu-btn" href="andregurule-library.html">📚 HALL OF RECORDS</a>
  <a class="menu-btn" href="castle-anthrax.html">🏰 CASTLE ANTHRAX</a>
  <button class="menu-btn" id="menuClose">✕ CLOSE</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="nes-controller">
  <div id="controller-body">
    <div id="dpad">
      <div class="dpad-h"></div><div class="dpad-v"></div><div class="dpad-center"></div>
      <div class="dpad-btn" id="btn-up"    data-dir="up"></div>
      <div class="dpad-btn" id="btn-down"  data-dir="down"></div>
      <div class="dpad-btn" id="btn-left"  data-dir="left"></div>
      <div class="dpad-btn" id="btn-right" data-dir="right"></div>
    </div>
    <div id="center-section">
      <div id="menu-btn-wrap">
        <div id="btnMenu" onclick="toggleMenu()"><div id="menu-btn-icon">MENU</div></div>
        <div id="menu-btn-label">MENU</div>
      </div>
      <div id="select-start-row">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="ss-btn" id="btnSelect"></div>
          <div class="ss-label">SELECT</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="ss-btn" id="btnStart"></div>
          <div class="ss-label">START</div>
        </div>
      </div>
    </div>
    <div id="ab-col">
      <div id="ab-buttons">
        <div class="ab-btn" id="btnB">B</div>
        <div class="ab-btn" id="btnA">A</div>
      </div>
      <div class="ab-label-row">
        <div class="ab-label">BACK</div>
        <div class="ab-label">INTERACT</div>
      </div>
    </div>
  </div>
  <div id="ctrl-hint">D-PAD · A=INTERACT · B=CLOSE · MENU=NAV · SELECT=INVENTORY</div>
</div>

<script>
// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
const GameState = (() => {
  const params = new URLSearchParams(location.search);
  let points   = parseInt(params.get('points') || '0', 10);
  let visited  = (params.get('visited') || '').split(',').filter(Boolean);
  let unlocked = (params.get('unlocked') || '').split(',').filter(Boolean);
  let items    = (params.get('items') || '').split(',').filter(Boolean);

  const toParams = () => {
    const p = new URLSearchParams();
    p.set('points', points); p.set('visited', visited.join(','));
    p.set('unlocked', unlocked.join(',')); p.set('items', items.join(','));
    return p.toString();
  };
  const withState = href => {
    const sep = href.includes('?') ? '&' : '?';
    const hash = href.includes('#') ? '#' + href.split('#')[1] : '';
    return href.split('#')[0] + sep + toParams() + hash;
  };
  const visitZone  = (id, pts) => { if (!visited.includes(id)) { visited.push(id); points += pts; } };
  const hasItem    = id => items.includes(id);
  const collectItem = (id, pts = 0) => { if (items.includes(id)) return false; items.push(id); points += pts; return true; };

  return { get points(){ return points; }, visited, unlocked, items,
           toParams, withState, visitZone, hasItem, collectItem };
})();

document.querySelectorAll('#menuOverlay a.menu-btn').forEach(a => {
  a.href = GameState.withState(a.getAttribute('href'));
});
document.getElementById('pointsDisplay').textContent = GameState.points;

// ─────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CTRL_H = 110;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight - CTRL_H; }
resize();
window.addEventListener('resize', () => { resize(); computeLakeGeometry(); resetPlayerPos(); });

// ─────────────────────────────────────────────
//  CENTRAL PARK LAKE POLYGON (normalized 0–1)
//  Based on the real lake shape — irregular amoeba,
//  wider in center, southeastern arm, northwestern cove
// ─────────────────────────────────────────────
const LAKE_POLY_NORM = [
  // Starting north tip, going clockwise
  [0.42, 0.06],  // N — narrow north tip
  [0.52, 0.05],
  [0.60, 0.07],
  [0.68, 0.10],  // NE bulge
  [0.74, 0.15],
  [0.76, 0.22],
  [0.74, 0.30],
  [0.70, 0.36],  // East indent
  [0.74, 0.42],
  [0.76, 0.50],  // E center bulge
  [0.75, 0.58],
  [0.72, 0.65],
  [0.68, 0.72],  // SE arm begins
  [0.66, 0.80],
  [0.62, 0.87],
  [0.56, 0.91],  // SE tip
  [0.50, 0.93],
  [0.44, 0.91],  // South dock area
  [0.38, 0.87],
  [0.32, 0.82],
  [0.26, 0.76],  // SW
  [0.22, 0.68],
  [0.20, 0.60],
  [0.22, 0.52],
  [0.24, 0.44],  // W side
  [0.22, 0.36],
  [0.20, 0.28],  // NW cove dip
  [0.24, 0.20],
  [0.30, 0.14],
  [0.36, 0.09],  // Back to N
];

let W, H, LAKE_MARGIN, lakePoly;

function computeLakeGeometry() {
  W = canvas.width; H = canvas.height;
  LAKE_MARGIN = Math.min(W, H) * 0.05;
  lakePoly = LAKE_POLY_NORM.map(([nx, ny]) => [
    LAKE_MARGIN + nx * (W - 2 * LAKE_MARGIN),
    LAKE_MARGIN + ny * (H - 2 * LAKE_MARGIN)
  ]);
}
computeLakeGeometry();

function pointInPoly(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi))
      inside = !inside;
  }
  return inside;
}

function lakePoint(nx, ny) {
  return {
    x: LAKE_MARGIN + nx * (W - 2 * LAKE_MARGIN),
    y: LAKE_MARGIN + ny * (H - 2 * LAKE_MARGIN)
  };
}

// ─────────────────────────────────────────────
//  PLAYER
// ─────────────────────────────────────────────
const PLAYER_SPEED = 2.6;
let playerX, playerY, playerDir = 'up', playerFrame = 0, frameTimer = 0;

function resetPlayerPos() {
  const pt = lakePoint(0.50, 0.86);
  playerX = pt.x; playerY = pt.y;
}
resetPlayerPos();

// ─────────────────────────────────────────────
//  NPCs
// ─────────────────────────────────────────────
const NPCS = [
  {
    id: 'duck',
    label: '🦆 DR. MALLARD',
    nx: 0.50, ny: 0.38,
    dialog: [
      "QUACK! Oh — pardon me. Dr. Mallard, at your service.",
      "I hold a doctorate in Aquatic Loitering from the University of Central Park.",
      "I've been studying these waters for eleven years.",
      "The humans are... tolerable. They bring bread.",
      "Andre once gave me half a pretzel. I consider him a colleague.",
      "Now if you'll excuse me — I have important floating to attend to. QUACK."
    ]
  },
  {
    id: 'raquel',
    label: '🚣 RAQUEL',
    nx: 0.30, ny: 0.52,
    dialog: [
      "Oh! I didn't see you paddling over.",
      "I come out here every weekend. The city disappears out here, you know?",
      "Have you met the duck? He likes to act sophisticated, but he begs for crackers.",
      "Andre and I used to argue about which direction to row.",
      "He always wanted to go counterclockwise. I'm a clockwise person.",
      "Some disagreements say more about people than any resume ever could.",
      "Anyway — lovely day for it. Don't tip over!"
    ]
  }
];

let npcDialogIdx = {}, activeDialog = null, dialogPages = [];

// ─────────────────────────────────────────────
//  DOCK (south entry/exit)
// ─────────────────────────────────────────────
const DOCK = { nx: 0.50, ny: 0.93, r: 38 };

// ─────────────────────────────────────────────
//  DECORATIONS — Central Park deciduous trees, benches, lamp posts
//  All in normalized coords outside the lake polygon

const LEAF_COLORS = ['#d44010','#c01818','#e0b010','#d08010','#3a6a20','#b83808'];
const LEAF_TRUNK  = '#5a3818';

// ─────────────────────────────────────────────
//  ANIMATION
// ─────────────────────────────────────────────
let waveOffset = 0, duckBob = 0;

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'm' || e.key === 'M') toggleMenu();
  if (e.key === 'i' || e.key === 'I') toggleInventory();
  if (e.key === 'Escape' || e.key === 'b' || e.key === 'B') { if (inventoryOpen) { closeInventory(); return; } closeDialog(); closeMenu(); }
  if (e.key === 'Enter' || e.key === ' ' || e.key === 'a' || e.key === 'A') handleInteract();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
document.addEventListener('mouseup', () => { Object.keys(keys).forEach(k => { keys[k] = false; }); });

const dirKeyMap = { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight' };
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  if (!dir) return;
  const key = dirKeyMap[dir];
  btn.addEventListener('pointerdown',  e => { e.preventDefault(); keys[key] = true;  btn.classList.add('pressing'); });
  btn.addEventListener('pointerup',    e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressing'); });
  btn.addEventListener('pointerleave', e => { keys[key] = false; btn.classList.remove('pressing'); });
  btn.addEventListener('touchstart',   e => { e.preventDefault(); keys[key] = true;  btn.classList.add('pressing'); }, { passive: false });
  btn.addEventListener('touchend',     e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressing'); }, { passive: false });
});
document.addEventListener('mouseup', () => {
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    if (btn.dataset.dir) { keys[dirKeyMap[btn.dataset.dir]] = false; btn.classList.remove('pressing'); }
  });
});
document.getElementById('btnA').addEventListener('click', handleInteract);
document.getElementById('btnSelect').addEventListener('click', toggleInventory);
document.getElementById('btnB').addEventListener('click', () => { if (inventoryOpen) { closeInventory(); return; } closeDialog(); closeMenu(); });
// btnMenu onclick is inline; also wire here for safety
document.getElementById('menuClose').addEventListener('click', closeMenu);
document.getElementById('btnStart').addEventListener('click', handleInteract);
canvas.addEventListener('click', handleInteract);

// ─────────────────────────────────────────────
//  MENU / DIALOG
// ─────────────────────────────────────────────
let menuOpen = false;
function toggleMenu() { menuOpen ? closeMenu() : openMenu(); }
function openMenu() {
  menuOpen = true;
  document.getElementById('menuOverlay').classList.add('open');
  document.querySelectorAll('#menuOverlay a.menu-btn').forEach(a => {
    a.href = GameState.withState(a.getAttribute('href'));
  });
}
function closeMenu() { menuOpen = false; document.getElementById('menuOverlay').classList.remove('open'); }

function openDialog(npcId, pages) {
  dialogPages = pages;
  const idx = npcDialogIdx[npcId] || 0;
  const npc = NPCS.find(n => n.id === npcId);
  activeDialog = { npcId, pageIndex: idx };
  document.getElementById('dialogBox').style.display = 'block';
  document.getElementById('dialogSpeaker').textContent = npc.label;
  document.getElementById('dialogText').textContent = pages[idx];
  const isLast = idx >= pages.length - 1;
  document.getElementById('dialogPrompt').textContent = isLast ? '[ A / ▶ Close ]' : '[ A / ▶ Next ]';
}

function advanceDialog() {
  if (!activeDialog) return;
  const { npcId, pageIndex } = activeDialog;
  const nextIdx = pageIndex + 1;
  if (nextIdx >= dialogPages.length) { npcDialogIdx[npcId] = 0; closeDialog(); }
  else {
    npcDialogIdx[npcId] = nextIdx;
    activeDialog.pageIndex = nextIdx;
    document.getElementById('dialogText').textContent = dialogPages[nextIdx];
    document.getElementById('dialogPrompt').textContent =
      nextIdx >= dialogPages.length - 1 ? '[ A / ▶ Close ]' : '[ A / ▶ Next ]';
  }
}
function closeDialog() { activeDialog = null; document.getElementById('dialogBox').style.display = 'none'; }

// ─────────────────────────────────────────────
//  INTERACT
// ─────────────────────────────────────────────
function handleInteract() {
  if (menuOpen) { closeMenu(); return; }
  if (activeDialog) { advanceDialog(); return; }

  // Dock exit
  const dp = lakePoint(DOCK.nx, DOCK.ny);
  if (Math.hypot(playerX - dp.x, playerY - dp.y) < DOCK.r + 22) {
    window.location.href = GameState.withState('world.html#spawn=the-lake');
    return;
  }
  // NPCs
  for (const npc of NPCS) {
    const np = lakePoint(npc.nx, npc.ny);
    if (Math.hypot(playerX - np.x, playerY - np.y) < 62) {
      openDialog(npc.id, npc.dialog); return;
    }
  }
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update(dt) {
  if (menuOpen || activeDialog || inventoryOpen) return;

  let dx = 0, dy = 0;
  if (keys['ArrowUp']    || keys['w']) { dy = -1; playerDir = 'up'; }
  if (keys['ArrowDown']  || keys['s']) { dy =  1; playerDir = 'down'; }
  if (keys['ArrowLeft']  || keys['a']) { dx = -1; playerDir = 'left'; }
  if (keys['ArrowRight'] || keys['d']) { dx =  1; playerDir = 'right'; }
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  const nx = playerX + dx * PLAYER_SPEED;
  const ny = playerY + dy * PLAYER_SPEED;

  if (pointInPoly(nx, ny, lakePoly)) { playerX = nx; playerY = ny; }
  else if (pointInPoly(nx, playerY, lakePoly)) { playerX = nx; }
  else if (pointInPoly(playerX, ny, lakePoly)) { playerY = ny; }

  if (dx !== 0 || dy !== 0) {
    frameTimer += dt;
    if (frameTimer > 200) { playerFrame = (playerFrame + 1) % 4; frameTimer = 0; }
  } else { playerFrame = 0; }

  waveOffset += dt * 0.00065;
  duckBob = Math.sin(Date.now() * 0.0018) * 2.5;
  document.getElementById('pointsDisplay').textContent = GameState.points;
}

// ─────────────────────────────────────────────
//  DRAW — DECIDUOUS TREE (Central Park style: elm/oak/maple)
//  Full rounded canopy, fall colors, layered
// ─────────────────────────────────────────────
function drawDecidTree(cx, cy, r, colorIdx) {
  const base = LEAF_COLORS[colorIdx];
  const dark = LEAF_COLORS[(colorIdx + 2) % LEAF_COLORS.length];
  const light = LEAF_COLORS[(colorIdx + 4) % LEAF_COLORS.length];

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx + r * 0.2, cy + r * 0.1, r * 1.1, r * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Trunk
  const trunkW = r * 0.18;
  ctx.fillStyle = LEAF_TRUNK;
  ctx.beginPath();
  ctx.moveTo(cx - trunkW, cy);
  ctx.lineTo(cx + trunkW, cy);
  ctx.lineTo(cx + trunkW * 0.6, cy - r * 0.55);
  ctx.lineTo(cx - trunkW * 0.6, cy - r * 0.55);
  ctx.closePath();
  ctx.fill();

  // Branch hints
  ctx.strokeStyle = '#4a2a10';
  ctx.lineWidth = r * 0.06;
  ctx.beginPath();
  ctx.moveTo(cx, cy - r * 0.5);
  ctx.lineTo(cx - r * 0.4, cy - r * 0.85);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - r * 0.55);
  ctx.lineTo(cx + r * 0.35, cy - r * 0.80);
  ctx.stroke();

  // Canopy — layered blobs for depth
  const blobs = [
    { ox: -0.15, oy: -0.85, rx: 0.9, ry: 0.82, col: dark },
    { ox:  0.20, oy: -0.80, rx: 0.85, ry: 0.78, col: base },
    { ox: -0.05, oy: -1.05, rx: 0.75, ry: 0.72, col: base },
    { ox:  0.0,  oy: -0.92, rx: 0.65, ry: 0.60, col: light },
  ];
  for (const b of blobs) {
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.ellipse(cx + b.ox * r, cy + b.oy * r, b.rx * r, b.ry * r, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Leaf texture dots
  ctx.save();
  ctx.globalAlpha = 0.35;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const dist = r * (0.3 + (i % 3) * 0.18);
    const lx = cx + Math.cos(angle) * dist;
    const ly = cy - r * 0.9 + Math.sin(angle) * dist * 0.7;
    ctx.fillStyle = i % 2 === 0 ? light : dark;
    ctx.beginPath();
    ctx.arc(lx, ly, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBench(cx, cy, angleDeg) {
  ctx.save();

  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(-18, 4, 5, 10);
  ctx.fillRect(13, 4, 5, 10);
  // Seat
  ctx.fillStyle = '#8b5a20';
  ctx.fillRect(-20, 0, 40, 6);
  // Back slats
  ctx.fillStyle = '#a06c30';
  ctx.fillRect(-20, -10, 40, 4);
  ctx.fillRect(-20, -15, 40, 3);
  // Back support posts
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(-15, -15, 3, 16);
  ctx.fillRect(12, -15, 3, 16);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  DRAW — PARK LAMP POST
// ─────────────────────────────────────────────
function drawLampPost(cx, cy) {
  // Pole
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(cx - 2, cy - 36, 4, 36);
  // Base
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx - 5, cy - 4, 10, 8);
  // Lamp head
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.arc(cx, cy - 36, 7, 0, Math.PI * 2);
  ctx.fill();
  // Warm light glow
  const glowAlpha = 0.25 + 0.1 * Math.sin(Date.now() * 0.002);
  ctx.save();
  ctx.globalAlpha = glowAlpha;
  const grd = ctx.createRadialGradient(cx, cy - 36, 0, cx, cy - 36, 28);
  grd.addColorStop(0, '#fff8a0');
  grd.addColorStop(1, 'rgba(255,230,100,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy - 36, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Glass
  ctx.fillStyle = '#ffe060';
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.arc(cx, cy - 36, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawFallenLeaf(cx, cy, colorIdx) {

// ─────────────────────────────────────────────
//  DRAW — DOCK
// ─────────────────────────────────────────────
function drawDock(cx, cy) {
  const dw = 76, dh = 20;
  // Posts
  ctx.fillStyle = '#5a3010';
  for (let i = -1; i <= 1; i++) {
    ctx.fillRect(cx + i * 26 - 3, cy - 6, 7, 22);
  }
  // Deck
  ctx.fillStyle = '#9a6a30';
  ctx.fillRect(cx - dw/2, cy - 8, dw, dh);
  // Plank lines
  ctx.strokeStyle = '#6a3a10'; ctx.lineWidth = 1.5;
  for (let i = 0; i <= 5; i++) {
    const lx = cx - dw/2 + i * (dw/5);
    ctx.beginPath(); ctx.moveTo(lx, cy - 8); ctx.lineTo(lx, cy + dh - 8); ctx.stroke();
  }
  // Sign
  ctx.fillStyle = '#4a2a08';
  ctx.fillRect(cx - 38, cy - 30, 76, 18);
  ctx.fillStyle = '#f0c040';
  ctx.font = '7px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOAT DOCK', cx, cy - 17);
  // Arrow
  ctx.fillStyle = '#f0c040';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText('▼ EXIT', cx, cy + 32);
  // Pulse ring
  const alpha = 0.35 + 0.3 * Math.sin(Date.now() * 0.003);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#50d0a0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy + 8, 32, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
//  DRAW — DUCK NPC (Dr. Mallard)
// ─────────────────────────────────────────────
function drawDuck(cx, cy) {
  cy += duckBob;
  const t = Date.now() * 0.001;

  // Ripples
  ctx.save();
  ctx.strokeStyle = 'rgba(80,200,160,0.3)';
  ctx.lineWidth = 1.2;
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.ellipse(cx, cy + 6, i * 13, i * 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(cx, cy);
  const waddle = Math.sin(t * 1.5) * 0.06;
  ctx.rotate(waddle);

  // Body
  ctx.fillStyle = '#f0f0e0';
  ctx.beginPath();
  ctx.ellipse(0, 4, 14, 10, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Wing accent
  ctx.fillStyle = '#d0d0c0';
  ctx.beginPath();
  ctx.ellipse(3, 4, 8, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Head — mallard green
  ctx.fillStyle = '#1a6a30';
  ctx.beginPath();
  ctx.arc(-4, -7, 8, 0, Math.PI * 2);
  ctx.fill();

  // White collar ring
  ctx.strokeStyle = '#f0f0e0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(-4, -2, 6, Math.PI * 0.1, Math.PI * 0.9);
  ctx.stroke();

  // Beak
  ctx.fillStyle = '#e0a020';
  ctx.beginPath();
  ctx.moveTo(-11, -7);
  ctx.lineTo(-18, -5);
  ctx.lineTo(-17, -9);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.arc(-6, -9, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-5.3, -9.6, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Tiny graduation cap (PhD duck!)
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(-9, -16, 12, 3);
  ctx.beginPath();
  ctx.moveTo(-9, -16);
  ctx.lineTo(-3, -22);
  ctx.lineTo(3, -16);
  ctx.closePath();
  ctx.fill();
  // Tassel
  ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(2, -16);
  ctx.lineTo(5, -11);
  ctx.stroke();
  ctx.fillStyle = '#f0c040';
  ctx.beginPath();
  ctx.arc(5, -10, 2, 0, Math.PI * 2);
  ctx.fill();

  // Name tag
  ctx.fillStyle = 'rgba(13,10,24,0.8)';
  ctx.fillRect(-32, 18, 64, 14);
  ctx.fillStyle = '#80e0b0';
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DR. MALLARD', 0, 28);

  ctx.restore();
}

function drawRaquel(cx, cy) {

  ctx.lineTo(-28, 8);

  // Boat interior
  ctx.fillStyle = '#9a5e34';

  // Boat trim

  ctx.beginPath();

  ctx.strokeStyle = '#8b5a20'; ctx.lineWidth = 3;

  ctx.rotate(Math.sin(t * 0.6) * 0.15);

  ctx.beginPath();
  ctx.ellipse(-50, 21, 8, 3, 0.4, 0, Math.PI * 2);

  ctx.save();
  ctx.rotate(-Math.sin(t * 0.6) * 0.15);
  ctx.beginPath();
  ctx.moveTo(28, 4);
  ctx.lineTo(48, 20);
  ctx.stroke();
  ctx.fillStyle = '#7a4818';
  ctx.beginPath();
  ctx.ellipse(50, 21, 8, 3, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body — autumn coat (rust red)
  ctx.fillStyle = '#b03818';
  ctx.beginPath();
  ctx.ellipse(0, -5, 11, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Scarf
  ctx.fillStyle = '#d4b040';
  ctx.fillRect(-8, -12, 16, 5);

  // Head
  ctx.fillStyle = '#e8a878';
  ctx.beginPath();
  ctx.arc(0, -22, 10, 0, Math.PI * 2);

  // Hair — dark, bun
  ctx.fillStyle = '#3a1a0a';
  ctx.beginPath();
  ctx.arc(0, -27, 8, Math.PI, Math.PI * 2);

  ctx.beginPath();
  ctx.arc(6, -27, 5, 0, Math.PI * 2);

  // Eyes

  ctx.beginPath(); ctx.arc(3.5, -22, 1.8, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.strokeStyle = '#6a3020'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(0, -19, 4, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Name tag
  ctx.fillStyle = 'rgba(13,10,24,0.8)';
  ctx.fillRect(-24, 32, 48, 14);
  ctx.fillStyle = '#f0d080';
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RAQUEL', 0, 42);

  ctx.restore();
}

// ─────────────────────────────────────────────
//  DRAW — PLAYER KAYAK (same as Lake Tahoe)
// ─────────────────────────────────────────────
function drawKayakPlayer(x, y, dir, frame) {
  const bob = Math.sin(Date.now() * 0.003) * 1.5;
  y += bob;
  ctx.save();
  ctx.translate(x, y);
  if (dir === 'left' || dir === 'right') ctx.rotate(dir === 'right' ? 0.07 : -0.07);

  // Hull
  ctx.fillStyle = '#5ab8e8';
  ctx.beginPath();
  if (dir === 'up' || dir === 'down') ctx.ellipse(0, 0, 10, 22, 0, 0, Math.PI * 2);
  else ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath();
  if (dir === 'up' || dir === 'down') ctx.ellipse(-3, -6, 4, 8, -0.2, 0, Math.PI * 2);
  else ctx.ellipse(-6, -3, 8, 4, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Cockpit rim
  ctx.fillStyle = '#d4a820';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Person
  ctx.fillStyle = '#f4a060';
  ctx.beginPath(); ctx.arc(0, -4, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#4060c0';
  ctx.fillRect(-3, -1, 6, 7);

  // Paddle
  const po = Math.sin(frame * Math.PI / 2) * 8;
  ctx.strokeStyle = '#8b5a20'; ctx.lineWidth = 2;
  if (dir === 'left' || dir === 'right') {
    const side = dir === 'right' ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(-18 + side * po, -po * 0.5); ctx.lineTo(18 + side * po, po * 0.5); ctx.stroke();
    ctx.fillStyle = '#c07030';
    ctx.beginPath(); ctx.ellipse(-18 + side * po, -po * 0.5, 6, 3, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(18 + side * po, po * 0.5, 6, 3, 0.5, 0, Math.PI * 2); ctx.fill();
  } else {
    const side = dir === 'down' ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(-po * 0.5, -18 + side * po); ctx.lineTo(po * 0.5, 18 + side * po); ctx.stroke();
    ctx.fillStyle = '#c07030';
    ctx.beginPath(); ctx.ellipse(-po * 0.5, -18 + side * po, 3, 6, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(po * 0.5, 18 + side * po, 3, 6, 0.5, 0, Math.PI * 2); ctx.fill();
  }

  // Wake
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
  for (let i = 1; i <= 2; i++) {
    ctx.beginPath(); ctx.ellipse(0, i * 11, 7 + i * 3, 2.5, 0, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  DRAW — INTERACT PROMPT
// ─────────────────────────────────────────────
function drawInteractPrompt(x, y) {
  const alpha = 0.6 + 0.4 * Math.sin(Date.now() * 0.004);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(13,10,24,0.85)';
  ctx.fillRect(x - 28, y - 32, 56, 14);
  ctx.fillStyle = '#f0c040';
  ctx.font = '7px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('▲ TALK', x, y - 22);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  MAIN DRAW
// ─────────────────────────────────────────────
function draw() {
  W = canvas.width; H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // ── LAND BACKGROUND — Central Park autumn grass ──
  const landGrad = ctx.createLinearGradient(0, 0, W * 0.5, H);
  landGrad.addColorStop(0, '#2a3a18');
  landGrad.addColorStop(0.5, '#243318');
  landGrad.addColorStop(1, '#1e2c12');
  ctx.fillStyle = landGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grass texture overlay — lighter patches
  ctx.save();
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < 20; i++) {
    const gx = (i * 137.5) % W;
    const gy = (i * 97.3) % H;
    const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, 80);
    gr.addColorStop(0, '#6a9040');
    gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(gx, gy, 80, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // ── PARK PATHS — winding stone paths ──
  ctx.save();
  ctx.strokeStyle = '#c0a878';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.setLineDash([]);
  // Path around the lake (west side)
  ctx.beginPath();
  const pw = lakePoint(0.14, 0.15);
  const pm = lakePoint(0.10, 0.50);
  const ps = lakePoint(0.14, 0.82);
  ctx.moveTo(pw.x, pw.y);
  ctx.bezierCurveTo(pw.x - 10, pm.y - 80, pm.x - 10, pm.y + 80, ps.x, ps.y);
  ctx.strokeStyle = '#c4ac80';
  ctx.lineWidth = 10;
  ctx.stroke();
  ctx.strokeStyle = '#b09060';
  ctx.lineWidth = 6;
  ctx.stroke();

  // East path
  ctx.beginPath();
  const pe1 = lakePoint(0.86, 0.18);
  const pe2 = lakePoint(0.88, 0.55);
  const pe3 = lakePoint(0.82, 0.85);
  ctx.moveTo(pe1.x, pe1.y);
  ctx.bezierCurveTo(pe1.x + 12, pe2.y - 80, pe2.x + 10, pe2.y + 60, pe3.x, pe3.y);
  ctx.strokeStyle = '#c4ac80';
  ctx.lineWidth = 10;
  ctx.stroke();
  ctx.strokeStyle = '#b09060';
  ctx.lineWidth = 6;
  ctx.stroke();

  // South path to dock
  ctx.beginPath();
  const pds = lakePoint(0.50, 0.97);
  ctx.moveTo(pds.x - 50, H);
  ctx.lineTo(pds.x + 50, H);
  ctx.bezierCurveTo(pds.x + 40, pds.y + 20, pds.x - 40, pds.y + 20, pds.x - 50, H);
  ctx.strokeStyle = '#c4ac80';
  ctx.lineWidth = 12;
  ctx.stroke();
  ctx.restore();

  // ── FALLEN LEAVES on ground ──
  for (const [nx, ny, ci] of DECO.fallenLeaves) {
    const fx = LAKE_MARGIN + nx * (W - 2 * LAKE_MARGIN);
    const fy = LAKE_MARGIN + ny * (H - 2 * LAKE_MARGIN);
    if (!pointInPoly(fx, fy, lakePoly)) drawFallenLeaf(fx, fy, ci);
  }

  // ── BENCHES ──
  for (const [nx, ny, ang] of DECO.benches) {
    const bp = lakePoint(nx, ny);
    if (!pointInPoly(bp.x, bp.y, lakePoly)) drawBench(bp.x, bp.y, ang);
  }

  // ── TREES ──
  for (const [nx, ny, rn, ci] of DECO.trees) {
    const tp = lakePoint(nx, ny);
    const r = rn * Math.min(W, H);
    drawDecidTree(tp.x, tp.y, r, ci);
  }

  // ── LAMP POSTS ──
  for (const [nx, ny] of DECO.lamps) {
    const lp = lakePoint(nx, ny);
    if (!pointInPoly(lp.x, lp.y, lakePoly)) drawLampPost(lp.x, lp.y);
  }

  // ── WATER ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lakePoly[0][0], lakePoly[0][1]);
  for (let i = 1; i < lakePoly.length; i++) ctx.lineTo(lakePoly[i][0], lakePoly[i][1]);
  ctx.closePath();
  ctx.clip();

  // Base water — blue-green
  const wg = ctx.createRadialGradient(W * 0.45, H * 0.45, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.55);
  wg.addColorStop(0, '#1a7868');
  wg.addColorStop(0.4, '#145a50');
  wg.addColorStop(0.75, '#0f4840');
  wg.addColorStop(1, '#0a3430');
  ctx.fillStyle = wg;
  ctx.fillRect(0, 0, W, H);

  // Ripple wave lines
  ctx.strokeStyle = 'rgba(60,180,150,0.16)';
  ctx.lineWidth = 1.3;
  for (let row = 0; row < 32; row++) {
    const wy = H * 0.04 + row * H * 0.029;
    const phase = waveOffset + row * 0.38;
    ctx.beginPath();
    for (let xi = 0; xi < W; xi += 4) {
      const yd = Math.sin((xi / W) * 9 + phase) * 2.5 + Math.cos((xi / W) * 5.5 + phase * 1.2) * 1.5;
      xi === 0 ? ctx.moveTo(xi, wy + yd) : ctx.lineTo(xi, wy + yd);
    }
    ctx.stroke();
  }

  // Sparkle highlights
  for (let i = 0; i < 22; i++) {
    const sx = W * (0.12 + (i * 0.618 % 0.76));
    const sy = H * (0.06 + ((i * 0.382) % 0.86));
    const sa = Math.abs(Math.sin(waveOffset * 1.6 + i * 0.8)) * 0.45;
    ctx.globalAlpha = sa;
    ctx.fillStyle = '#a0f0d8';
    ctx.fillRect(sx, sy, 2 + Math.sin(waveOffset + i) * 0.8, 1);
  }
  ctx.globalAlpha = 1;

  // Autumn leaf reflections on water
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 12; i++) {
    const rx = W * (0.2 + (i * 0.7 % 0.6));
    const ry = H * (0.15 + (i * 0.5 % 0.7));
    ctx.fillStyle = LEAF_COLORS[i % LEAF_COLORS.length];
    ctx.beginPath();
    ctx.ellipse(rx, ry, 4, 2, waveOffset + i, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  ctx.restore(); // end water clip

  // ── LAKE SHORE EDGE ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lakePoly[0][0], lakePoly[0][1]);
  for (let i = 1; i < lakePoly.length; i++) ctx.lineTo(lakePoly[i][0], lakePoly[i][1]);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(60,200,160,0.4)';
  ctx.lineWidth = 5;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(100,220,180,0.12)';
  ctx.lineWidth = 12;
  ctx.stroke();
  ctx.restore();

  // ── DOCK ──
  const dp = lakePoint(DOCK.nx, DOCK.ny);
  drawDock(dp.x, dp.y);

  // ── NPCs ──
  for (const npc of NPCS) {
    const np = lakePoint(npc.nx, npc.ny);
    if (npc.id === 'duck') drawDuck(np.x, np.y);
    else if (npc.id === 'raquel') drawRaquel(np.x, np.y);

    if (!activeDialog && !menuOpen) {
      if (Math.hypot(playerX - np.x, playerY - np.y) < 65) drawInteractPrompt(np.x, np.y);
    }
  }

  // Dock proximity cue
  if (!activeDialog && !menuOpen) {
    if (Math.hypot(playerX - dp.x, playerY - dp.y) < DOCK.r + 22) {
      const alpha = 0.5 + 0.4 * Math.sin(Date.now() * 0.004);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#50e0b0';
      ctx.font = '8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▲ EXIT MAP', dp.x, dp.y - 42);
      ctx.restore();
    }
  }

  // ── PLAYER ──
  drawKayakPlayer(playerX, playerY, playerDir, playerFrame);

  // ── LOCATION LABEL ──
  ctx.save();
  ctx.fillStyle = 'rgba(13,10,24,0.72)';
  ctx.fillRect(W / 2 - 88, 10, 176, 22);
  ctx.strokeStyle = '#1a7060';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(W / 2 - 88, 10, 176, 22);
  ctx.fillStyle = '#80e8c8';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🌊 THE LAKE', W / 2, 26);
  ctx.restore();
}


// ─────────────────────────────────────────────
//  INVENTORY
// ─────────────────────────────────────────────
const ITEMS = [
  {id:'holy-grail',    icon:'🏆', label:'Holy Grail',         category:'quest',       points:50, page:'Castle Anthrax'},
  {id:'skeleton-key',  icon:'🔑', label:'Skeleton Key',        category:'key',         points:30, page:'World Map'},
  {id:'sword',         icon:'⚔️', label:'Sword',               category:'quest',       points:25, page:'Erebor Mountain'},
  {id:'cert-badge',    icon:'📜', label:'Certification Badge', category:'collectible', points:20, page:'Hall of Records'},
  {id:'first-edition', icon:'📖', label:'First Edition',       category:'collectible', points:20, page:'Scroll Library'},
  {id:'fishing-rod',   icon:'🎣', label:'Fishing Rod',         category:'collectible', points:15, page:'Lake Tahoe'},
  {id:'blue-kayak',    icon:'🚣', label:'Blue Kayak',          category:'quest',       points:15, page:'Castle Anthrax'},
  {id:'artwork',       icon:'🖼️', label:'Artwork',             category:'collectible', points:10, page:'Town Square'},
  {id:'bread',         icon:'🍞', label:'Bread',               category:'collectible', points:10, page:'Town Square'},
  {id:'old-compass',   icon:'🧭', label:'Old Compass',         category:'collectible', points:10, page:'The Lake'},
  {id:'sapphire',      icon:'💎', label:'Sapphire',            category:'key',         points:75, page:'World Map'},
  {id:'ruby',          icon:'🔴', label:'Ruby',                category:'key',         points:75, page:'World Map'},
];

let inventoryOpen = false;
function toggleInventory() { inventoryOpen ? closeInventory() : openInventory(); }
function openInventory() {
  if (activeDialog) closeDialog();
  if (menuOpen) closeMenu();
  inventoryOpen = true;
  document.getElementById('btnSelect').classList.add('pressed');
  renderInventory();
  document.getElementById('inventory-overlay').classList.add('open');
}
function closeInventory() {
  inventoryOpen = false;
  document.getElementById('inventory-overlay').classList.remove('open');
  document.getElementById('btnSelect').classList.remove('pressed');
}
function renderInventory() {
  const total = ITEMS.reduce((s, i) => s + i.points, 0);
  document.getElementById('inventory-points-banner').textContent =
    'Points: ' + GameState.points + ' / ' + total;
  const list = document.getElementById('inventory-list');
  list.innerHTML = '';
  [{key:'quest',label:'QUEST ITEMS'},{key:'key',label:'KEY ITEMS'},{key:'collectible',label:'COLLECTIBLES'}]
    .forEach(cat => {
      const catItems = ITEMS.filter(i => i.category === cat.key);
      if (!catItems.length) return;
      const h = document.createElement('div');
      h.className = 'inv-category'; h.textContent = cat.label; list.appendChild(h);
      const grid = document.createElement('div'); grid.className = 'inv-grid';
      catItems.forEach(item => {
        const got = GameState.hasItem(item.id);
        const card = document.createElement('div');
        card.className = 'inv-item ' + (got ? 'obtained' : 'locked');
        const icon = document.createElement('div'); icon.className = 'inv-icon';
        icon.textContent = got ? item.icon : '❓';
        const name = document.createElement('div');
        name.className = 'inv-name' + (got ? '' : ' locked-name');
        name.textContent = got ? item.label : '???';
        const loc = document.createElement('div'); loc.className = 'inv-location';
        loc.textContent = item.page;
        const pts = document.createElement('div'); pts.className = 'inv-pts';
        pts.textContent = item.points + ' pts';
        const badge = document.createElement('div');
        badge.className = got ? 'inv-check' : 'inv-lock';
        badge.textContent = got ? '✓' : '🔒';
        card.append(icon, name, loc, pts, badge);
        grid.appendChild(card);
      });
      list.appendChild(grid);
    });
}
// ─────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

GameState.visitZone('the-lake', 10);
</script>

<div id="inventory-overlay">
  <div id="inventory-box">
    <div id="inventory-title">★ INVENTORY ★</div>
    <div id="inventory-subtitle">Items collected on your journey</div>
    <div id="inventory-points-banner"></div>
    <div id="inventory-list"></div>
    <div id="inventory-close-hint">
      <span style="background:#222;border:1.5px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;">SELECT</span>
      or
      <span style="background:#222;border:1.5px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;">B</span>
      to close
    </div>
  </div>
</div>
