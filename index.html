<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Andre Gurule — Portfolio World</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#f0c040;
  --ui-bg:#0d0a18;
}
body{
  background:#000;
  font-family:'Press Start 2P',monospace;
  overflow:hidden;width:100vw;height:100vh;
  -webkit-tap-highlight-color:transparent;
}

/* Full-screen background image */
#splash-bg{
  position:fixed;inset:0;
  background-image:url('images/index-portal-hero.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:#000;
  z-index:0;
}
/* Dark scrim so overlaid text stays readable against the bright portal */
#splash-scrim{
  position:fixed;inset:0;
  background:linear-gradient(180deg,
    rgba(0,0,0,0.55) 0%,
    rgba(0,0,0,0.15) 35%,
    rgba(0,0,0,0.15) 60%,
    rgba(0,0,0,0.70) 100%);
  z-index:1;
}

/* Foreground content stack */
#splash-content{
  position:relative;z-index:2;
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:18px;padding:clamp(24px,6vh,60px) 20px;
  text-align:center;
}

#loading-title{
  font-size:clamp(10px,3vw,22px);color:var(--gold);
  text-align:center;line-height:2;
  text-shadow:0 2px 8px rgba(0,0,0,0.9), 0 0 18px rgba(0,0,0,0.7);
}
#loading-sub{
  font-family:'VT323',monospace;
  font-size:clamp(24px,5.25vw,33px);
  color:#FF7A1A;text-align:center;
  text-shadow:0 2px 6px rgba(0,0,0,0.9);
  margin-top:auto; margin-bottom:8vh;
}

/* Push PRESS START toward the bottom so the central portal stays clear */
#press-start{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,1.8vw,12px);color:var(--gold);
  border:3px solid var(--gold);
  padding:clamp(10px,2vh,14px) clamp(16px,3vw,24px);
  background:rgba(13,10,24,0.55);cursor:pointer;
  margin-top:auto;
  text-shadow:0 2px 6px rgba(0,0,0,0.9);
  touch-action:manipulation;
}
#press-start:hover,#press-start:active{
  background:rgba(240,192,64,0.18);
}

/* Portrait mobile: bias the single wide image toward Andre on the right */
@media (max-aspect-ratio: 3/4){
  #splash-bg{
    background-position:51% center;
  }
}
</style>
</head>
<body>

<div id="splash-bg"></div>
<div id="splash-scrim"></div>

<div id="splash-content">
  <div id="loading-title">ANDRE GURULE<br>PERSONAL WEBSITE</div>
  <div id="loading-sub">Welcome to my<br>website.<br>Press start to<br>begin exploring.</div>
  <button id="press-start" onclick="startGame()">▶ PRESS START</button>
</div>

<script>
// Initialize fresh game state here — this is the only place state is born.
// Values are passed to index.html (and all other pages) via URL query params.
function startGame(){
  const state = {
    points: 0,
    visited: '',   // comma-separated zone ids visited
    unlocked: ''   // comma-separated unlocked secrets (e.g. 'g14')
  };
  const params = new URLSearchParams(state).toString();
  window.location.href = 'world.html?' + params;
}

// Also allow keyboard ENTER / Space to start
document.addEventListener('keydown', e => {
  if(e.key === 'Enter' || e.key === ' ') startGame();
});
</script>
</body>
</html>
